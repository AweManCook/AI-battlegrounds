function ground(){return cvs.height*.72}function menu(){screen='menu';hud.style.display='none';scroll=0}function select(){screen='select';hud.style.display='none';scroll=0}function randomize(){p1c=Math.floor(Math.random()*chars.length);p2c=Math.floor(Math.random()*chars.length);if(chars.length>1&&p2c===p1c)p2c=(p2c+1+Math.floor(Math.random()*(chars.length-1)))%chars.length}function mid(o){return o.x+o.w/2}

function bg(){ctx.fillStyle='#131c30';ctx.fillRect(0,0,cvs.width,cvs.height);ctx.fillStyle='#ffffff08';for(let i=0;i<9;i++)ctx.fillRect(i*190-((Date.now()/90)%190),70,80,cvs.height*.55);ctx.fillStyle='#202020';ctx.fillRect(0,ground(),cvs.width,cvs.height-ground());ctx.fillStyle='#ffffff18';ctx.fillRect(0,ground(),cvs.width,4)}function button(x,y,w,h,txt,sub,fn,on=false){zones.push({x,y,w,h,f:fn});ctx.fillStyle=on?'#ffffff35':'#0008';ctx.strokeStyle=on?'white':'#ffffff44';ctx.lineWidth=on?3:2;ctx.fillRect(x,y,w,h);ctx.strokeRect(x,y,w,h);ctx.textAlign='center';ctx.fillStyle='white';ctx.font='bold 22px Arial';ctx.fillText(txt,x+w/2,y+34);ctx.font='14px Arial';ctx.fillStyle='#ffffffbb';ctx.fillText(sub,x+w/2,y+58)}function drawMenu(){hud.style.display='none';zones=[];bg();tip.textContent='Prototype menu';ctx.textAlign='center';ctx.fillStyle='white';ctx.font='bold 46px Arial';ctx.fillText('FRIENDS BATTLEGROUNDS STABLE',cvs.width/2,105);ctx.font='18px Arial';ctx.fillStyle='#ffffffbb';ctx.fillText('Ranked Rush: 2x dmg, 1.5x speed, double HP for 4s.',cvs.width/2,138);let cx=cvs.width/2;button(cx-330,190,300,90,'1  PvP','same keyboard',()=>{mode='pvp';select()},mode==='pvp');button(cx+30,190,300,90,'2  PvAI','fight a bot',()=>{mode='pvai';select()},mode==='pvai');diffs.forEach((d,i)=>button(cx-230,325+i*58,460,46,d.name,'AI difficulty',()=>{diff=i;mode='pvai'},diff===i))}

function spark(x,y,col,n=16,s=3){for(let i=0;i<n;i++){let a=Math.random()*Math.PI*2,v=Math.random()*s+1;parts.push({x,y,vx:Math.cos(a)*v,vy:Math.sin(a)*v,life:26,size:3+Math.random()*4,col})}}function spawnBurst(o){spark(mid(o),o.y+25,o.ch.color,55,6)}function box(o){let w=o.ch.range+(o.combo===4?18:0);return{x:o.face===1?o.x+o.w:o.x-w,y:o.y+18,w,h:52}}function rushBox(o){let w=92;return{x:o.face===1?o.x+o.w:o.x-w,y:o.y+10,w,h:72}}function slamBox(o){return{x:mid(o)-190,y:ground()-75,w:380,h:75}}function ov(a,b){return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y}function hurt(o,e,dmg,kb,up=-4,st=16){e.hp=Math.max(0,e.hp-dmg);e.vx=o.face*kb;e.vy=up;e.stun=Math.max(e.stun,st);spark(mid(e),e.y+35,o.ch.accent,18,4);freeze=5;if(e.hp<=0)screen='over'}function m1(o){if(o.cd||o.stun||o.state)return;if(o.reset<=0)o.combo=0;o.combo=o.combo%4+1;o.atk=o.combo===4?18:13;o.cd=o.ch.cd+(o.combo===4?8:0);if(o.buff)o.cd=Math.max(7,o.cd-5);if(o.ch.name==='VinnyIsGood')o.cd=Math.max(8,o.cd-3);if(o.ch.name==='Gecko85'&&o.combo===1)o.vx+=o.face*3;o.reset=46;o.did=0}function hitCheck(o,e){if(o.did||!ov(box(o),e))return;o.did=1;let dmg=o.ch.dmg[o.combo-1],kb=o.ch.kb||7;if(o.buff&&o.ch.name==='VinnyIsGood')dmg*=2;if(o.ch.kind==='tag'&&o.combo===4)dmg+=2;if(e.block&&e.face===-o.face&&e.vy===0){dmg=Math.ceil(dmg*.35);kb*=.35;spark(mid(e),e.y+35,'#fff',8,2)}hurt(o,e,dmg,kb,o.combo===4?-7:-3,o.combo===4?18:10)}
function special(o,e){if(o.spec||o.stun||o.state)return;o.spec=210;if(o.ch.name==='Gecko85'){o.state='rush';o.t=42;o.did=0;o.vx=o.face*13;o.vy=-1;spark(mid(o),o.y+35,o.ch.accent,35,5)}else if(o.ch.name==='Ripple'){o.state='slam';o.t=40;o.vx=0;o.vy=-15;spark(mid(o),o.y+35,o.ch.accent,26,5)}else if(o.ch.name==='VinnyIsGood'){o.buff=240;o.rank=1;o.max=o.base*2;o.hp=Math.min(o.max,o.hp+o.base);o.cd=0;o.reset=60;spark(mid(o),o.y+35,o.ch.accent,48,5)}else if(o.ch.kind==='tag'){o.state='pincer';o.t=66;e.stun=Math.max(e.stun,20);rush.push({t:66,o,e});spark(mid(e),e.y+35,o.ch.accent,34,5)}else{o.state='gearcast';o.t=55;fields.push({owner:o,x:e.x-130,y:ground()-15,w:260,h:18,t:90,col:o.ch.accent});for(let i=0;i<10;i++)gears.push({owner:o,x:e.x-300+i*70+Math.random()*30,y:-90-Math.random()*220,vy:5+Math.random()*2.5,r:23+Math.random()*14,rot:Math.random()*6.28,life:170,hit:0,col:o.ch.accent});spark(mid(e),ground()-90,o.ch.accent,38,5)}}function runState(o,e){if(!o.state)return false;o.t--;if(o.state==='rush'){o.vx=o.face*13;if(ov(rushBox(o),e)&&!o.did){o.did=1;e.stun=Math.max(e.stun,42);e.vx=0;e.vy=0;hurt(o,e,23,3,-2,42);o.vx=-o.face*5;o.state=null;spark(mid(e),e.y+35,o.ch.accent,40,5)}if(o.t<=0)o.state=null;return true}if(o.state==='slam'){o.vy+=o.t>14?1.2:3.7;if(o.y+o.h>=ground()){o.y=ground()-o.h;o.vy=0;if(Math.abs(mid(e)-mid(o))<190)hurt(o,e,20,10,-9,26);for(let i=0;i<54;i++){let a=i/54*6.28;parts.push({x:mid(o),y:ground()-5,vx:Math.cos(a)*(2+Math.random()*6),vy:-Math.abs(Math.sin(a))*(1+Math.random()*5),life:32,size:3+Math.random()*5,col:o.ch.accent})}freeze=8;o.state=null}return true}if(o.state==='pincer'){if(o.t%7===0&&o.t>9){e.hp=Math.max(0,e.hp-2);e.stun=Math.max(e.stun,8);e.vx=(o.t%14===0?1:-1)*4;spark(mid(e),e.y+35,o.ch.accent,10,3);freeze=2}if(o.t===9){e.hp=Math.max(0,e.hp-8);e.vx=o.face*12;e.vy=-7;e.stun=22;spark(mid(e),e.y+35,o.ch.accent,26,5);freeze=6}if(o.t<=0)o.state=null;return false}if(o.state==='gearcast'){if(o.t<=0)o.state=null;return false}return false}
function input(o){return{l:keys[o.ctrl.l],r:keys[o.ctrl.r],j:keys[o.ctrl.j],m:keys[o.ctrl.m],b:keys[o.ctrl.b],s:keys[o.ctrl.s]}}function bot(o,e){let d=diffs[diff];if(d.name==='Dummy')return{};let dis=mid(e)-mid(o),ab=Math.abs(dis),q={};if(ab>o.ch.range){q.l=dis<0;q.r=dis>0}else if(ab<35){q.l=dis>0;q.r=dis<0}if(ab<o.ch.range+35&&Math.random()<d.atk)q.m=1;if(o.spec<=0&&Math.random()<d.spec)q.s=1;if(o.y+o.h>=ground()&&Math.random()<.012)q.j=1;return q}function step(o,e,q){o.block=!!q.b;if(o.stun<=0&&!runState(o,e)){if(q.l){o.vx-=.75;o.face=-1}if(q.r){o.vx+=.75;o.face=1}if(q.j&&!o.jHeld&&o.jumps>0){o.vy=-16;o.jumps--;spark(mid(o),o.y+55,o.ch.accent,12,2)}o.jHeld=!!q.j;if(q.m)m1(o);if(q.s)special(o,e)}else if(o.stun>0)o.state=null;let boost=o.spawn>0?1.35:1;if(o.buff&&o.ch.name==='VinnyIsGood')boost*=1.5;else if(o.buff)boost*=1.18;o.vx=Math.max(-o.ch.spd*boost,Math.min(o.ch.spd*boost,o.vx));o.vy+=.78;o.x+=o.vx;o.y+=o.vy;o.vx*=o.y+o.h>=ground()?.78:.93;if(o.y+o.h>=ground()){o.y=ground()-o.h;o.vy=0;o.jumps=2}o.x=Math.max(20,Math.min(cvs.width-o.w-20,o.x));if(o.atk>0){let elapsed=(o.combo===4?18:13)-o.atk;if(elapsed>=3&&elapsed<=(o.combo===4?13:9))hitCheck(o,e)}o.atk=Math.max(0,o.atk-1);o.cd=Math.max(0,o.cd-1);o.reset=Math.max(0,o.reset-1);o.stun=Math.max(0,o.stun-1);o.spec=Math.max(0,o.spec-1);o.buff=Math.max(0,o.buff-1);if(o.rank&&o.buff<=0){o.rank=0;o.max=o.base;o.hp=Math.min(o.hp,o.base)}o.spawn=Math.max(0,o.spawn-1);o.spawnAnim=Math.max(0,o.spawnAnim-1)}
function drawHitbox(b,col){ctx.save();ctx.fillStyle=col;ctx.strokeStyle='white';ctx.lineWidth=2;ctx.globalAlpha=.28;ctx.fillRect(b.x,b.y,b.w,b.h);ctx.globalAlpha=.75;ctx.strokeRect(b.x,b.y,b.w,b.h);ctx.restore()}function drawGear(g){ctx.save();ctx.translate(g.x,g.y);ctx.rotate(g.rot);ctx.strokeStyle=g.col;ctx.fillStyle='#ffffff18';ctx.lineWidth=4;ctx.beginPath();for(let i=0;i<12;i++){let a=i*Math.PI*2/12,r=i%2?g.r:g.r*.72;ctx.lineTo(Math.cos(a)*r,Math.sin(a)*r)}ctx.closePath();ctx.fill();ctx.stroke();ctx.beginPath();ctx.arc(0,0,g.r*.35,0,Math.PI*2);ctx.stroke();ctx.restore()}function updateGears(){for(let f of fields){f.t--;for(let o of[A,B])if(o!==f.owner&&o.x+o.w>f.x&&o.x<f.x+f.w&&o.y+o.h>=f.y){o.stun=Math.max(o.stun,8);o.vx*=.78}}fields=fields.filter(f=>f.t>0);for(let g of gears){g.y+=g.vy;g.vy+=.25;g.rot+=.16;g.life--;for(let o of[A,B])if(o!==g.owner&&!g.hit&&Math.abs(mid(o)-g.x)<g.r+20&&Math.abs(o.y+35-g.y)<g.r+40){g.hit=1;hurt(g.owner,o,12,8,-8,18);spark(g.x,g.y,g.col,22,4)}if(g.y>ground()-10&&!g.hit){g.hit=1;spark(g.x,ground()-10,g.col,18,3)}}gears=gears.filter(g=>g.life>0&&g.y<cvs.height+90)}function weapon(o){ctx.strokeStyle=o.ch.accent;ctx.lineWidth=o.ch.kind==='tag'||o.ch.kind==='staff'?6:4;ctx.lineCap='round';let r=(o.atk?32:22)+(o.combo||1)*3,d=o.face;ctx.beginPath();if(o.ch.kind==='dual'){ctx.moveTo(d*5,-8);ctx.lineTo(d*r,-10);ctx.moveTo(d*5,8);ctx.lineTo(d*r,10)}else if(o.ch.kind==='staff'){ctx.moveTo(d*5,-15);ctx.lineTo(d*r,15)}else if(o.ch.kind==='tag'){ctx.moveTo(d*5,-8);ctx.lineTo(d*r,6);ctx.moveTo(d*20,14);ctx.lineTo(d*(r+10),-10)}else{ctx.moveTo(d*5,-4);ctx.lineTo(d*r,5)}ctx.stroke()}function body(o,off=0,col=null){ctx.save();ctx.translate(mid(o)+off*o.face,o.y+o.h/2);if(o.stun)ctx.translate(Math.sin(Date.now()/22)*3,0);ctx.fillStyle='#0008';ctx.fillRect(-20,20,40,8);ctx.fillStyle=o.stun?'#fff':(col||o.ch.color);ctx.fillRect(-17,-23,34,54);ctx.beginPath();ctx.arc(0,-33,16,0,Math.PI*2);ctx.fill();ctx.fillStyle='#111';ctx.fillRect(o.face*5,-37,8*o.face,4);weapon(o);if(o.block){ctx.strokeStyle='#fff9';ctx.lineWidth=3;ctx.beginPath();ctx.arc(o.face*27,1,18,-1.2,1.2);ctx.stroke()}ctx.restore()}function drawGuy(o){if(o.ch.kind==='tag'){body(o,-16,o.ch.color);body(o,18,o.ch.alt);ctx.fillStyle='#fffc';ctx.font='10px Arial';ctx.textAlign='center';ctx.fillText('TAG',mid(o),o.y-20)}else body(o);if(o.spawnAnim>0){ctx.strokeStyle=o.ch.accent;ctx.globalAlpha=o.spawnAnim/70;ctx.lineWidth=4;ctx.beginPath();ctx.arc(mid(o),o.y+25,70-o.spawnAnim*.45,0,Math.PI*2);ctx.stroke();ctx.globalAlpha=1}ctx.textAlign='center';if(o.stun>0){ctx.fillStyle='#ffef7a';ctx.font='bold 13px Arial';ctx.fillText('STUN '+(o.stun/60).toFixed(1)+'s',mid(o),o.y-34)}if(o.spawn>0){ctx.fillStyle=o.ch.accent;ctx.font='12px Arial';ctx.fillText('SPAWN BOOST '+Math.ceil(o.spawn/60),mid(o),o.y-20)}else if(o.buff&&o.ch.name==='VinnyIsGood'){ctx.fillStyle=o.ch.accent;ctx.font='bold 12px Arial';ctx.fillText('RANKED RUSH '+Math.ceil(o.buff/60),mid(o),o.y-20)}else if(o.buff){ctx.fillStyle=o.ch.accent;ctx.font='12px Arial';ctx.fillText('BUFF',mid(o),o.y-20)}if(o.reset>0){ctx.fillStyle='white';ctx.font='13px Arial';ctx.fillText('M1-'+o.combo,mid(o),o.y-8)}}
function fight(){zones=[];bg();for(let f of fields){ctx.fillStyle=f.col;ctx.globalAlpha=.22;ctx.fillRect(f.x,f.y,f.w,f.h);ctx.globalAlpha=1;drawHitbox({x:f.x,y:f.y-55,w:f.w,h:70},f.owner.ch.color)}for(let g of gears){drawGear(g);drawHitbox({x:g.x-g.r,y:g.y-g.r,w:g.r*2,h:g.r*2},g.owner.ch.color)}for(let r of rush){r.t--;let x=mid(r.e),y=r.e.y+35;ctx.globalAlpha=Math.max(0,r.t/66);ctx.strokeStyle=r.o.ch.color;ctx.lineWidth=7;ctx.beginPath();ctx.moveTo(x-130,y-24);ctx.lineTo(x+5,y);ctx.stroke();ctx.strokeStyle=r.o.ch.alt||r.o.ch.accent;ctx.beginPath();ctx.moveTo(x+130,y+24);ctx.lineTo(x-5,y);ctx.stroke();ctx.globalAlpha=1;drawHitbox({x:x-145,y:y-45,w:290,h:90},r.o.ch.color)}rush=rush.filter(r=>r.t>0);if(A&&A.atk>0)drawHitbox(box(A),A.ch.color);if(B&&B.atk>0)drawHitbox(box(B),B.ch.color);if(A&&A.state==='rush')drawHitbox(rushBox(A),A.ch.color);if(B&&B.state==='rush')drawHitbox(rushBox(B),B.ch.color);if(A&&A.state==='slam')drawHitbox(slamBox(A),A.ch.color);if(B&&B.state==='slam')drawHitbox(slamBox(B),B.ch.color);tip.textContent=screen==='over'?(A.hp<=0?(B.ai?'AI wins':'P2 wins'):'P1 wins')+' - R menu':(mode==='pvai'?'PvAI | hitboxes visible':'PvP | hitboxes visible');if(freeze>0)freeze--;else if(screen==='fight'){step(A,B,input(A));step(B,A,B.ai?bot(B,A):input(B));updateGears()}if(Math.abs(A.x-B.x)>10&&!A.state)A.face=A.x<B.x?1:-1;if(Math.abs(B.x-A.x)>10&&!B.state)B.face=B.x<A.x?1:-1;for(let p of parts){p.x+=p.vx;p.y+=p.vy;p.vy+=.08;p.life--}parts=parts.filter(p=>p.life>0);for(let p of parts){ctx.globalAlpha=p.life/26;ctx.fillStyle=p.col;ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1}drawGuy(A);drawGuy(B);if(A.hp<=0||B.hp<=0)screen='over';h1.style.width=A.hp/A.max*100+'%';h2.style.width=B.hp/B.max*100+'%';h1.style.background=A.ch.color;h2.style.background=B.ch.color}function loop(){if(screen==='menu')drawMenu();else if(screen==='select')drawSelect();else fight();requestAnimationFrame(loop)}loop();
</script></body></html>
