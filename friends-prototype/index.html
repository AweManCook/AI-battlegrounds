let AC=null,music=false,beat=0,musicId=null;function audio(){if(!AC)AC=new (window.AudioContext||window.webkitAudioContext)();if(AC.state==='suspended')AC.resume()}function tone(f=440,d=.08,type='square',v=.035,slide=1){if(!AC)return;let o=AC.createOscillator(),g=AC.createGain();o.type=type;o.frequency.value=f;o.frequency.exponentialRampToValueAtTime(Math.max(40,f*slide),AC.currentTime+d);g.gain.value=v;g.gain.exponentialRampToValueAtTime(.001,AC.currentTime+d);o.connect(g);g.connect(AC.destination);o.start();o.stop(AC.currentTime+d)}function sfx(n){if(!AC)return;if(n==='ui')tone(540,.04,'sine',.025,1.25);if(n==='swing')tone(290,.045,'sawtooth',.018,1.25);if(n==='hit'){tone(110,.045,'square',.03,.75);tone(260,.035,'triangle',.018,.85)}if(n==='break'){tone(65,.16,'square',.055,.35);setTimeout(()=>tone(185,.08,'sawtooth',.04,.55),35)}if(n==='jump')tone(340,.08,'triangle',.03,1.7);if(n==='spawn'){tone(220,.12,'sine',.04,2.4);setTimeout(()=>tone(560,.08,'triangle',.035,1.5),45)}if(n==='special'){tone(170,.12,'sawtooth',.04,1.7);setTimeout(()=>tone(620,.09,'square',.025,1.15),60)}}function musicStep(){if(!music||!AC)return;let roots=[207.65,233.08,277.18,155.56],root=roots[Math.floor(beat/16)%4],arp=[1,1.122,1.334,1.5,1.334,1.122,1,.75][beat%8];if(beat%4===0)tone(root/2,.22,'sawtooth',.02,.92);if(beat%2===0)tone(root*arp,.09,'triangle',.016,1.03);if(beat%8===6)tone(root*2,.1,'sine',.012,1.35);if(beat%16===8)tone(82,.04,'square',.03,.55);beat++;musicId=setTimeout(musicStep,128)}function toggleMusic(){audio();music=!music;if(music){beat=0;musicStep()}else clearTimeout(musicId)}

function special(o,e){if(o.spec||o.stun||(o.state&&o.state!=='pincer'&&o.state!=='gearcast'))return;sfx('special');o.spec=SPEC_CD;if(o.ch.name==='Gecko85'){o.state='rush';o.t=42;o.did=0;o.vx=o.face*13;o.vy=-1;trail(o,o.ch.color);spark(mid(o),o.y+35,o.ch.accent,35,5)}else if(o.ch.name==='Ripple'){o.state='slam';o.t=40;o.vx=0;o.vy=-15;text(mid(o),o.y-40,'RIPPLE!',o.ch.color)}else if(o.ch.name==='VinnyIsGood'){o.buff=240;o.cd=0;o.reset=60;spark(mid(o),o.y+35,o.ch.accent,60,6);text(mid(o),o.y-45,'RANKED RUSH',o.ch.color)}else if(o.ch.kind==='tag'){o.state='pincer';o.t=66;o.tagX=e.x+(o.face===1?e.w+42:-42);o.tagY=e.y;e.stun=Math.max(e.stun,30);rush.push({t:66,o,e});text(mid(e),e.y-45,'FLANK!',o.ch.color)}else{o.state='gearcast';o.t=55;fields.push({owner:o,x:e.x-130,y:ground()-15,w:260,h:18,t:90,col:o.ch.accent});for(let i=0;i<10;i++)gears.push({owner:o,x:e.x-300+i*70+Math.random()*30,y:-90-Math.random()*220,vy:5+Math.random()*2.5,r:23+Math.random()*14,rot:Math.random()*6.28,life:170,hit:0,col:o.ch.accent});text(mid(o),o.y-45,'GEARFALL',o.ch.color)}}
function runState(o,e){if(!o.state)return false;o.t--;if(o.state==='rush'){o.vx=o.face*13;trail(o,o.ch.color);if(ov(rushBox(o),e)&&!o.did){o.did=1;hurt(o,e,23,14,-3,54,'special');o.vx=-o.face*5;o.state=null}spark(mid(o),o.y+40,o.ch.color,2,2,true);if(o.t<=0)o.state=null;return true}if(o.state==='slam'){o.vy+=o.t>14?1.2:3.7;if(o.y+o.h>=ground()){o.y=ground()-o.h;o.vy=0;if(Math.abs(mid(e)-mid(o))<190)hurt(o,e,20,13,-8,42,'special');for(let i=0;i<70;i++){let a=i/70*6.28;particle(mid(o),ground()-5,o.ch.accent,Math.cos(a)*(2+Math.random()*7),-Math.abs(Math.sin(a))*(1+Math.random()*5),34,3+Math.random()*5)}freeze=6;o.state=null}return true}if(o.state==='pincer'){o.tagX=e.x+(o.face===1?e.w+42:-42);o.tagY=e.y;if(o.t%7===0&&o.t>9){e.hp=Math.max(0,e.hp-2);e.stun=Math.max(e.stun,24);e.vx=(o.t%14===0?1:-1)*4;spark(mid(e),e.y+35,o.ch.accent,8,2,true);freeze=1}if(o.t===9){hurt(o,e,8,16,-7,38,'special');text(mid(e),e.y-45,'PINCH',o.ch.color)}if(o.t<=0){o.state=null;o.tagX=null;o.tagY=null}return false}if(o.state==='gearcast'){if(o.t<=0)o.state=null;return false}return false}
function input(o){return{l:keys[o.ctrl.l],r:keys[o.ctrl.r],j:keys[o.ctrl.j],m:keys[o.ctrl.m],b:keys[o.ctrl.b],s:keys[o.ctrl.s]}}function bot(o,e){let d=D[diff];if(d.name==='Dummy')return{};let dis=mid(e)-mid(o),ab=Math.abs(dis),q={};let move=d.move||1;if(ab>o.ch.range){q.l=dis<0&&Math.random()<move;q.r=dis>0&&Math.random()<move}else if(ab<35){q.l=dis>0&&Math.random()<move;q.r=dis<0&&Math.random()<move}if(ab<o.ch.range+40&&Math.random()<d.atk)q.m=1;if(o.spec<=0&&Math.random()<d.spec)q.s=1;if(o.y+o.h>=ground()&&Math.random()<.01*move)q.j=1;return q}
function step(o,e,q){o.block=!!q.b;if(o.stun<=0&&!runState(o,e)){if(q.l){o.vx-=.75;o.face=-1}if(q.r){o.vx+=.75;o.face=1}if(q.j&&!o.jHeld&&o.jumps>0){sfx('jump');o.vy=-16;o.jumps--;spark(mid(o),o.y+55,o.ch.accent,10,2)}o.jHeld=!!q.j;if(q.m)m1(o);if(q.s)special(o,e)}else if(o.stun>0)o.state=null;let boost=o.spawn>0?1.35:1;if(o.buff&&o.ch.name==='VinnyIsGood')boost*=1.9;else if(o.buff)boost*=1.18;o.vx=clamp(o.vx,-o.ch.spd*boost,o.ch.spd*boost);o.vy+=.78;o.lastX=o.x;o.x+=o.vx;o.y+=o.vy;o.vx*=o.y+o.h>=ground()?.82:.94;if(o.y+o.h>=ground()){o.y=ground()-o.h;o.vy=0;o.jumps=2}o.x=clamp(o.x,20,cvs.width-o.w-20);if(o.atk>0){let elapsed=(o.combo===4?18:13)-o.atk;if(elapsed>=3&&elapsed<=(o.combo===4?13:9))hitCheck(o,e)}o.atk=Math.max(0,o.atk-1);o.cd=Math.max(0,o.cd-1);o.reset=Math.max(0,o.reset-1);o.stun=Math.max(0,o.stun-1);o.spec=Math.max(0,o.spec-1);o.buff=Math.max(0,o.buff-1);o.spawn=Math.max(0,o.spawn-1);o.spawnAnim=Math.max(0,o.spawnAnim-1);o.anim+=Math.abs(o.x-o.lastX)*.12+(o.y+o.h<ground()?.18:.05)}
function drawHitbox(b,col){ctx.save();ctx.fillStyle=col;ctx.strokeStyle='white';ctx.lineWidth=2;ctx.globalAlpha=.16;ctx.fillRect(b.x,b.y,b.w,b.h);ctx.globalAlpha=.55;ctx.strokeRect(b.x,b.y,b.w,b.h);ctx.restore()}function drawGear(g){ctx.save();ctx.translate(g.x,g.y);ctx.rotate(g.rot);ctx.strokeStyle=g.col;ctx.fillStyle='#ffffff18';ctx.lineWidth=4;ctx.beginPath();for(let i=0;i<12;i++){let a=i*Math.PI*2/12,r=i%2?g.r:g.r*.72;ctx.lineTo(Math.cos(a)*r,Math.sin(a)*r)}ctx.closePath();ctx.fill();ctx.stroke();ctx.restore()}function updateGears(){for(let f of fields){f.t--;for(let o of[A,B])if(o!==f.owner&&o.x+o.w>f.x&&o.x<f.x+f.w&&o.y+o.h>=f.y){o.stun=Math.max(o.stun,22);o.vx*=.78}}fields=fields.filter(f=>f.t>0);for(let g of gears){g.y+=g.vy;g.vy+=.25;g.rot+=.16;g.life--;for(let o of[A,B])if(o!==g.owner&&!g.hit&&Math.abs(mid(o)-g.x)<g.r+20&&Math.abs(o.y+35-g.y)<g.r+40){g.hit=1;hurt(g.owner,o,12,10,-7,34,'special');spark(g.x,g.y,g.col,20,4)}if(g.y>ground()-10&&!g.hit){g.hit=1;spark(g.x,ground()-10,g.col,15,3)}}gears=gears.filter(g=>g.life>0&&g.y<cvs.height+90)}
function drawWeapon(o){ctx.strokeStyle=o.ch.accent;ctx.lineWidth=o.ch.kind==='tag'||o.ch.kind==='staff'?6:4;ctx.lineCap='round';let r=(o.atk?34:23)+(o.combo||1)*3,d=o.face;ctx.beginPath();if(o.ch.kind==='dual'){ctx.moveTo(d*4,-9);ctx.lineTo(d*r,-12);ctx.moveTo(d*4,9);ctx.lineTo(d*r,12)}else if(o.ch.kind==='staff'){ctx.moveTo(d*5,-17);ctx.lineTo(d*r,17)}else if(o.ch.kind==='tag'){ctx.moveTo(d*5,-8);ctx.lineTo(d*r,6);ctx.moveTo(d*20,14);ctx.lineTo(d*(r+10),-10)}else{ctx.moveTo(d*5,-4);ctx.lineTo(d*r,5)}ctx.stroke()}function oneBody(o,off=0,col=null){let bob=Math.sin(o.anim)*2.2,run=Math.sin(o.anim*2)*5;ctx.save();ctx.translate(mid(o)+off*o.face,o.y+o.h/2+bob);if(o.stun)ctx.translate(Math.sin(time*.5)*2,0);ctx.fillStyle='#0008';ctx.beginPath();ctx.ellipse(0,47-bob,28,8,0,0,Math.PI*2);ctx.fill();let c=col||o.ch.color;ctx.fillStyle=c;ctx.beginPath();ctx.moveTo(-18,-24);ctx.lineTo(18,-24);ctx.lineTo(15,27);ctx.lineTo(8,35);ctx.lineTo(-8,35);ctx.lineTo(-15,27);ctx.closePath();ctx.fill();ctx.fillStyle=o.stun?'#fff':c;ctx.beginPath();ctx.arc(0,-36,16,0,Math.PI*2);ctx.fill();ctx.fillStyle='#111';ctx.beginPath();ctx.moveTo(-13,-47);ctx.lineTo(0,-56);ctx.lineTo(13,-47);ctx.lineTo(9,-39);ctx.lineTo(-10,-39);ctx.closePath();ctx.fill();ctx.fillRect(o.face*4,-39,9*o.face,4);ctx.strokeStyle='#1118';ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(-13,-10);ctx.lineTo(13,-10);ctx.stroke();ctx.strokeStyle=c;ctx.lineWidth=5;ctx.beginPath();ctx.moveTo(-8,28);ctx.lineTo(-12-run*.18,46);ctx.moveTo(8,28);ctx.lineTo(12+run*.18,46);ctx.stroke();drawWeapon(o);if(o.block){ctx.strokeStyle='#fff9';ctx.lineWidth=3;ctx.beginPath();ctx.arc(o.face*28,0,18,-1.2,1.2);ctx.stroke()}ctx.restore()}function drawBodyAt(o,x,y,col){let ox=o.x,oy=o.y;o.x=x-o.w/2;o.y=y;oneBody(o,0,col);o.x=ox;o.y=oy}
function drawGuy(o,scale=1,xOverride=null,yOverride=null){ctx.save();if(xOverride!==null){ctx.translate(xOverride,yOverride);ctx.scale(scale,scale);ctx.translate(-mid(o),-(o.y+o.h/2))}if(o.ch.kind==='tag'){let weave=Math.sin(time*.08)*18;oneBody(o,-20+weave*.25,o.ch.color);if(o.state==='pincer'&&o.tagX!==null){drawBodyAt(o,o.tagX,o.tagY,o.ch.alt);ctx.strokeStyle=o.ch.alt;ctx.globalAlpha=.35;ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(mid(o),o.y+38);ctx.lineTo(o.tagX,o.tagY+38);ctx.stroke();ctx.globalAlpha=1}else oneBody(o,22-weave*.25,o.ch.alt);ctx.fillStyle='#fffc';ctx.font='10px Arial';ctx.textAlign='center';ctx.fillText('TAG',mid(o),o.y-20)}else oneBody(o);if(o.spawnAnim>0){ctx.strokeStyle=o.ch.accent;ctx.globalAlpha=o.spawnAnim/90;ctx.lineWidth=4;ctx.beginPath();ctx.arc(mid(o),o.y+25,80-o.spawnAnim*.35,0,Math.PI*2);ctx.stroke();ctx.globalAlpha=1}ctx.restore();if(scale===1){ctx.textAlign='center';if(o.stun>0){ctx.fillStyle='#ffef7a';ctx.font='900 13px Arial';ctx.fillText('STUN '+Math.ceil(o.stun)+'F',mid(o),o.y-34)}if(o.spawn>0){ctx.fillStyle=o.ch.accent;ctx.font='12px Arial';ctx.fillText('SPAWN BOOST '+Math.ceil(o.spawn/60),mid(o),o.y-20)}else if(o.buff&&o.ch.name==='VinnyIsGood'){ctx.fillStyle=o.ch.accent;ctx.font='900 12px Arial';ctx.fillText('RANKED RUSH '+Math.ceil(o.buff/60),mid(o),o.y-20)}if(o.reset>0){ctx.fillStyle='white';ctx.font='13px Arial';ctx.fillText('M1-'+o.combo,mid(o),o.y-8)}}}
function drawFX(){for(let r of rings){r.life--;ctx.globalAlpha=Math.max(0,r.life/r.max);ctx.strokeStyle=r.col;ctx.lineWidth=4;ctx.beginPath();ctx.arc(r.x,r.y,r.r+(r.max-r.life)*1.8,0,Math.PI*2);ctx.stroke();ctx.globalAlpha=1}rings=rings.filter(r=>r.life>0);for(let a of trails){ctx.globalAlpha=a.life/a.max*.25;ctx.fillStyle=a.col;ctx.fillRect(a.x,a.y,a.w,a.h);ctx.globalAlpha=1;a.life--}trails=trails.filter(a=>a.life>0);for(let p of parts){p.x+=p.vx;p.y+=p.vy;p.vy+=.06;p.life--}parts=parts.filter(p=>p.life>0);for(let p of parts){ctx.globalAlpha=Math.max(0,p.life/p.max);ctx.fillStyle=p.col;ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1}for(let t of texts){t.y-=.65;t.life--;ctx.globalAlpha=Math.max(0,t.life/42);ctx.fillStyle=t.col;ctx.font='900 18px Arial';ctx.textAlign='center';ctx.fillText(t.t,t.x,t.y);ctx.globalAlpha=1}texts=texts.filter(t=>t.life>0)}
function drawIntro(){zones=[];bg();drawFX();introT++;let phase=introT<120?1:introT<240?2:3;let o=phase===1?A:B;let side=phase===1?'PLAYER 1':'PLAYER 2';let t=phase===1?introT:introT-120;if(phase<3){let ease=Math.min(1,t/35),scale=1.8+Math.sin(time*.06)*.03,x=phase===1?cvs.width*.33:cvs.width*.67,y=cvs.height*.52;ctx.fillStyle='rgba(0,0,0,.45)';ctx.fillRect(0,0,cvs.width,cvs.height);ctx.strokeStyle=o.ch.color;ctx.lineWidth=6;ctx.globalAlpha=.8;ctx.beginPath();ctx.moveTo(phase===1?0:cvs.width,cvs.height*.2);ctx.lineTo(phase===1?cvs.width*.72:cvs.width*.28,cvs.height*.2);ctx.stroke();ctx.globalAlpha=1;drawGuy(o,scale*ease,x,y);ctx.textAlign=phase===1?'left':'right';ctx.fillStyle=o.ch.color;ctx.font='900 24px Arial';ctx.fillText(side,phase===1?80:cvs.width-80,cvs.height*.24);ctx.fillStyle='white';ctx.font='900 42px Arial';ctx.fillText(o.ch.name,phase===1?80:cvs.width-80,cvs.height*.31);ctx.fillStyle='#ffffffd0';ctx.font='italic 24px Arial';ctx.fillText('“'+o.ch.line+'”',phase===1?80:cvs.width-80,cvs.height*.38)}else{ctx.fillStyle='rgba(0,0,0,.35)';ctx.fillRect(0,0,cvs.width,cvs.height);ctx.textAlign='center';ctx.fillStyle='white';ctx.font='900 78px Arial';ctx.fillText('FIGHT!',cvs.width/2,cvs.height*.45);drawGuy(A);drawGuy(B);if(introT>295)beginFight()}tip.textContent='Intro cutscene'}
function cdHud(o){let p=Math.max(0,Math.min(100,(1-o.spec/SPEC_CD)*100));let label=o.spec?('Special CD '+Math.ceil(o.spec/60)+'s'):'Special ready';return label+`<div class='cd'><div class='cdf' style='width:${p}%;background:${o.ch.color}'></div></div>`+(o.jumps<2?'jumps '+o.jumps:'')}function fight(){zones=[];bg();for(let f of fields){ctx.fillStyle=f.col;ctx.globalAlpha=.18;ctx.fillRect(f.x,f.y,f.w,f.h);ctx.globalAlpha=1;drawHitbox({x:f.x,y:f.y-55,w:f.w,h:70},f.owner.ch.color)}for(let g of gears){drawGear(g);drawHitbox({x:g.x-g.r,y:g.y-g.r,w:g.r*2,h:g.r*2},g.owner.ch.color)}for(let r of rush){r.t--;let x=mid(r.e),y=r.e.y+35;ctx.globalAlpha=Math.max(0,r.t/66);ctx.strokeStyle=r.o.ch.color;ctx.lineWidth=7;ctx.beginPath();ctx.moveTo(x-130,y-24);ctx.lineTo(x+5,y);ctx.stroke();ctx.strokeStyle=r.o.ch.alt||r.o.ch.accent;ctx.beginPath();ctx.moveTo(r.o.tagX||x+130,y+24);ctx.lineTo(x-5,y);ctx.stroke();ctx.globalAlpha=1;drawHitbox({x:x-145,y:y-45,w:290,h:90},r.o.ch.color)}rush=rush.filter(r=>r.t>0);if(A&&A.atk>0)drawHitbox(box(A),A.ch.color);if(B&&B.atk>0)drawHitbox(box(B),B.ch.color);if(A&&A.state==='rush')drawHitbox(rushBox(A),A.ch.color);if(B&&B.state==='rush')drawHitbox(rushBox(B),B.ch.color);if(A&&A.state==='slam')drawHitbox(slamBox(A),A.ch.color);if(B&&B.state==='slam')drawHitbox(slamBox(B),B.ch.color);tip.textContent=screen==='over'?(A.hp<=0?(B.ai?'AI wins':'P2 wins'):'P1 wins')+' - R menu':(mode==='pvai'?'PvAI | frame stun display | longer combo stun':'PvP | frame stun display | longer combo stun');if(freeze>0)freeze--;else if(screen==='fight'){step(A,B,input(A));step(B,A,B.ai?bot(B,A):input(B));updateGears()}if(Math.abs(A.x-B.x)>10&&!A.state)A.face=A.x<B.x?1:-1;if(Math.abs(B.x-A.x)>10&&!B.state)B.face=B.x<A.x?1:-1;drawFX();drawGuy(A);drawGuy(B);if(A.hp<=0||B.hp<=0)screen='over';h1.style.width=A.hp/A.max*100+'%';h2.style.width=B.hp/B.max*100+'%';h1.style.background=`linear-gradient(90deg,${A.ch.color},${A.ch.accent})`;h2.style.background=`linear-gradient(90deg,${B.ch.co
