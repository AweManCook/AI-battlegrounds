function drawBody(o,off=0,col=o.ch.color,x=null,y=null){let ox=o.x,oy=o.y;if(x!==null){o.x=x-o.w/2;o.y=y}let bob=Math.sin(o.anim)*2.2,run=Math.sin(o.anim*2)*5;ctx.save();ctx.translate(mid(o)+off*o.face,o.y+o.h/2+bob);if(o.stun)ctx.translate(Math.sin(time*.5)*2,0);ctx.fillStyle='#0008';ctx.beginPath();ctx.ellipse(0,47-bob,28,8,0,0,7);ctx.fill();ctx.fillStyle=o.stun?'#fff':col;ctx.beginPath();ctx.moveTo(-18,-24);ctx.lineTo(18,-24);ctx.lineTo(15,27);ctx.lineTo(8,35);ctx.lineTo(-8,35);ctx.lineTo(-15,27);ctx.closePath();ctx.fill();ctx.beginPath();ctx.arc(0,-36,16,0,7);ctx.fill();ctx.fillStyle='#111';ctx.beginPath();ctx.moveTo(-13,-47);ctx.lineTo(0,-56);ctx.lineTo(13,-47);ctx.closePath();ctx.fill();ctx.fillRect(o.face*4,-39,9*o.face,4);ctx.strokeStyle=col;ctx.lineWidth=5;ctx.beginPath();ctx.moveTo(-8,28);ctx.lineTo(-12-run*.18,46);ctx.moveTo(8,28);ctx.lineTo(12+run*.18,46);ctx.stroke();ctx.strokeStyle=o.ch.acc;ctx.lineWidth=o.ch.kind==='staff'||o.ch.kind==='tag'?6:4;ctx.beginPath();let r=(o.atk?34:23)+(o.combo||1)*3,d=o.face;ctx.moveTo(d*5,-4);ctx.lineTo(d*r,5);if(o.ch.kind==='dual'){ctx.moveTo(d*4,9);ctx.lineTo(d*r,12)}ctx.stroke();if(o.block){ctx.strokeStyle='#fff9';ctx.beginPath();ctx.arc(o.face*28,0,18,-1.2,1.2);ctx.stroke()}ctx.restore();if(x!==null){o.x=ox;o.y=oy}}
function drawGuy(o){if(o.ch.kind==='tag'){let w=Math.sin(time*.08)*18;drawBody(o,-20+w*.25,o.ch.color);if(o.state==='pincer'&&o.tagX!==null){drawBody(o,0,'#ff3030',o.tagX,o.tagY);ctx.strokeStyle='#ff303088';ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(mid(o),o.y+38);ctx.lineTo(o.tagX,o.tagY+38);ctx.stroke()}else drawBody(o,22-w*.25,'#ff3030')}else drawBody(o);ctx.textAlign='center';if(o.stun>0){ctx.fillStyle='#ffef7a';ctx.font='900 13px Arial';ctx.fillText('STUN '+Math.ceil(o.stun)+'F',mid(o),o.y-34)}else if(o.buff){ctx.fillStyle=o.ch.acc;ctx.font='900 12px Arial';ctx.fillText('RANKED '+Math.ceil(o.buff/60),mid(o),o.y-20)}if(o.reset>0){ctx.fillStyle='white';ctx.font='13px Arial';ctx.fillText('M1-'+o.combo,mid(o),o.y-8)}}function fx(){for(let r of rings){r.l--;ctx.globalAlpha=r.l/r.m;ctx.strokeStyle=r.c;ctx.lineWidth=4;ctx.beginPath();ctx.arc(r.x,r.y,r.r+(r.m-r.l)*1.8,0,7);ctx.stroke();ctx.globalAlpha=1}rings=rings.filter(r=>r.l>0);for(let p of parts){p.x+=p.vx;p.y+=p.vy;p.vy+=.06;p.l--}parts=parts.filter(p=>p.l>0);for(let p of parts){ctx.globalAlpha=p.l/p.m;ctx.fillStyle=p.c;ctx.beginPath();ctx.arc(p.x,p.y,p.s,0,7);ctx.fill();ctx.globalAlpha=1}for(let t of texts){t.y-=.65;t.l--;ctx.globalAlpha=t.l/42;ctx.fillStyle=t.c;ctx.font='900 18px Arial';ctx.textAlign='center';ctx.fillText(t.t,t.x,t.y);ctx.globalAlpha=1}texts=texts.filter(t=>t.l>0)}
function cd(o){let p=Math.max(0,Math.min(100,(1-o.spec/SPEC)*100));return (o.spec?'Special CD '+Math.ceil(o.spec/60)+'s':'Special ready')+`<div class=cd><div class=cdf style='width:${p}%;background:${o.ch.color}'></div></div>`}function fight(){bg();tip.textContent=screen==='over'?(A.hp<=0?(B.ai?'AI wins':'P2 wins'):'P1 wins')+' - R menu':(mode==='pvai'?'PvAI | stunned characters cannot attack':'PvP | stunned characters cannot attack');if(freeze>0)freeze--;else if(screen==='fight'){step(A,B,inp(A));step(B,A,B.ai?ai(B,A):inp(B))}if(Math.abs(A.x-B.x)>10&&!A.state)A.face=A.x<B.x?1:-1;if(Math.abs(B.x-A.x)>10&&!B.state)B.face=B.x<A.x?1:-1;fx();drawGuy(A);drawGuy(B);if(A.hp<=0||B.hp<=0)screen='over';h1.style.width=A.hp/A.max*100+'%';h2.style.width=B.hp/B.max*100+'%';h1.style.background=`linear-gradient(90deg,${A.ch.color},${A.ch.acc})`;h2.style.background=`linear-gradient(90deg,${B.ch.color},${B.ch.acc})`;s1.textContent=Math.ceil(A.hp)+'/'+A.max;s2.textContent=Math.ceil(B.hp)+'/'+B.max;b1.innerHTML=cd(A);b2.innerHTML=cd(B)}function drawIntro(){bg();intro++;ctx.textAlign='center';ctx.fillStyle='white';ctx.font='900 58px Arial';if(intro<90){ctx.fillText(A.ch.name,cvs.width/2,cvs.height*.36);ctx.font='italic 24px Arial';ctx.fillText('“'+A.ch.line+'”',cvs.width/2,cvs.height*.43);drawGuy(A)}else if(intro<180){ctx.fillText(B.ch.name,cvs.width/2,cvs.height*.36);ctx.font='italic 24px Arial';ctx.fillText('“'+B.ch.line+'”',cvs.width/2,cvs.height*.43);drawGuy(B)}else{ctx.font='900 80px Arial';ctx.fillText('FIGHT!',cvs.width/2,cvs.height*.45);drawGuy(A);drawGuy(B);if(intro>225){screen='fight';hud.style.display='flex'}}}
function loop(){time++;if(screen==='menu')menu();else if(screen==='select')select();else if(screen==='intro')drawIntro();else fight();requestAnimationFrame(loop)}loop();
</script></body></html>
