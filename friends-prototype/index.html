<!doctype html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Friends Battlegrounds Polish</title><style>html,body{margin:0;overflow:hidden;background:#07101f;color:white;font-family:Inter,Arial,sans-serif}canvas{display:block}#tip{position:fixed;top:10px;left:0;right:0;text-align:center;font-weight:800;letter-spacing:.5px;text-shadow:0 2px 8px #000;pointer-events:none}#hud{position:fixed;top:38px;left:22px;right:22px;display:none;justify-content:space-between;pointer-events:none}.hudbox{width:41%;padding:10px 12px;background:linear-gradient(180deg,#000b,#0007);border:1px solid #ffffff44;box-shadow:0 12px 30px #0008;border-radius:14px}.hudtop{display:flex;justify-content:space-between;gap:10px;font-weight:900;font-size:14px}.bar{height:18px;background:#1b2333;border:1px solid #ffffff2e;border-radius:99px;overflow:hidden;margin-top:6px}.fill{height:100%;width:100%;transition:width .12s linear}.sub{font-size:11px;opacity:.78;margin-top:4px}</style></head><body><canvas id='c'></canvas><div id='tip'></div><div id='hud'><div class='hudbox'><div class='hudtop'><span id='n1'>P1</span><span id='s1'></span></div><div class='bar'><div id='h1' class='fill'></div></div><div id='b1' class='sub'></div></div><div class='hudbox'><div class='hudtop'><span id='s2'></span><span id='n2'>P2</span></div><div class='bar'><div id='h2' class='fill'></div></div><div id='b2' class='sub' style='text-align:right'></div></div></div><script>

let keys={},zones=[],screen='menu',mode='pvp',p1c=0,p2c=1,diff=1,A,B,parts=[],gears=[],rush=[],fields=[],texts=[],after=[],scroll=0,freeze=0,time=0;
addEventListener('keydown',e=>{let k=e.key.toLowerCase();keys[k]=1;if(['arrowleft','arrowright','arrowup','arrowdown','enter',' '].includes(k))e.preventDefault();if(screen==='fight'||screen==='over'){if(k==='r')menu()}else if(screen==='menu'){if(k==='1'){mode='pvp';select()}if(k==='2'){mode='pvai';select()}if(k==='w'||k==='arrowup')diff=(diff+2)%3;if(k==='s'||k==='arrowdown')diff=(diff+1)%3}else if(screen==='select'){if(k==='a')p1c=(p1c+4)%5;if(k==='d')p1c=(p1c+1)%5;if(k==='arrowleft')p2c=(p2c+4)%5;if(k==='arrowright')p2c=(p2c+1)%5;if(k==='q')diff=(diff+2)%3;if(k==='e')diff=(diff+1)%3;if(k==='x')randomize();if(k==='enter')start();if(k==='escape'||k==='m')menu()}});
addEventListener('keyup',e=>keys[e.key.toLowerCase()]=0);addEventListener('wheel',e=>{if(screen==='select'){scroll=Math.max(0,Math.min(260,scroll+e.deltaY));e.preventDefault()}},{passive:false});addEventListener('mousedown',e=>{let x=e.clientX,y=e.clientY+(screen==='select'?scroll:0);for(let i=zones.length-1;i>=0;i--){let z=zones[i];if(x>=z.x&&x<=z.x+z.w&&y>=z.y&&y<=z.y+z.h){z.f();break}}});
function ground(){return cvs.height*.72}function mid(o){return o.x+o.w/2}function clamp(v,a,b){return Math.max(a,Math.min(b,v))}function menu(){screen='menu';hud.style.display='none';scroll=0}function select(){screen='select';hud.style.display='none';scroll=0}function randomize(){p1c=Math.floor(Math.random()*C.length);p2c=Math.floor(Math.random()*C.length);if(C.length>1&&p2c===p1c)p2c=(p2c+1+Math.floor(Math.random()*(C.length-1)))%C.length}
function make(x,face,ch,ctrl,ai=false){return{x,y:ground()-82,w:38,h:82,vx:0,vy:0,face,ch,base:ch.hp,hp:ch.hp,max:ch.hp,combo:0,atk:0,cd:0,reset:0,stun:0,spec:0,buff:0,rank:0,spawn:300,spawnAnim:70,jumps:2,jHeld:0,state:null,t:0,did:0,ai,ctrl,anim:0,lastX:x}}
function start(){screen='fight';hud.style.display='flex';parts=[];gears=[];rush=[];fields=[];texts=[];after=[];freeze=0;A=make(180,1,C[p1c],{l:'a',r:'d',j:'w',m:'f',b:'g',s:'t'});B=make(cvs.width-220,-1,C[p2c],{l:'arrowleft',r:'arrowright',j:'arrowup',m:'/',b:'.',s:'enter'},mode==='pvai');n1.textContent='P1: '+A.ch.name;n2.textContent=(B.ai?'AI '+D[diff].name+': ':'P2: ')+B.ch.name;burst(A,70,7);burst(B,70,7);floatText(mid(A),A.y-35,'READY',A.ch.color);floatText(mid(B),B.y-35,'READY',B.ch.color)}
function bg(){let g=ctx.createLinearGradient(0,0,0,cvs.height);g.addColorStop(0,'#0d1b33');g.addColorStop(.65,'#101827');g.addColorStop(.651,'#17202e');g.addColorStop(1,'#101015');ctx.fillStyle=g;ctx.fillRect(0,0,cvs.width,cvs.height);ctx.fillStyle='#ffffff08';for(let i=0;i<10;i++){let x=i*180-((time*.55)%180);ctx.fillRect(x,78,70,cvs.height*.48)}ctx.fillStyle='#0005';ctx.fillRect(0,ground()+8,cvs.width,40);ctx.fillStyle='#242936';ctx.fillRect(0,ground(),cvs.width,cvs.height-ground());ctx.fillStyle='#ffffff18';ctx.fillRect(0,ground(),cvs.width,4);ctx.fillStyle='#ffffff08';for(let x=0;x<cvs.width;x+=64)ctx.fillRect(x,ground()+18,34,4)}
function rect(x,y,w,h,r=12){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath()}

function drawMenu(){hud.style.display='none';zones=[];bg();tip.textContent='Polish build';ctx.textAlign='center';ctx.fillStyle='white';ctx.font='900 48px Arial';ctx.fillText('FRIENDS BATTLEGROUNDS',cvs.width/2,104);ctx.font='18px Arial';ctx.fillStyle='#ffffffc8';ctx.fillText('clean UI • animated fighters • upgraded VFX',cvs.width/2,137);let cx=cvs.width/2;button(cx-330,192,300,90,'1  PvP','same keyboard',()=>{mode='pvp';select()},mode==='pvp');button(cx+30,192,300,90,'2  PvAI','fight a bot',()=>{mode='pvai';select()},mode==='pvai');D.forEach((d,i)=>button(cx-230,328+i*58,460,46,d.name,'AI difficulty',()=>{diff=i;mode='pvai'},diff===i))}

function drawSelect(){hud.style.display='none';zones=[];bg();tip.textContent='Character select';ctx.save();ctx.translate(0,-scroll);ctx.textAlign='center';ctx.fillStyle='white';ctx.font='900 40px Arial';ctx.fillText('PICK YOUR FIGHTER',cvs.width/2,92);let w=Math.min(182,cvs.width/6),h=215,g=10,total=w*5+g*4,sx=cvs.width/2-total/2;ctx.textAlign='left';ctx.font='900 21px Arial';ctx.fillText('Player 1',sx,154);C.forEach((ch,i)=>card(sx+i*(w+g),175,w,h,ch,p1c===i,'P1',()=>p1c=i));ctx.fillStyle='white';ctx.font='900 21px Arial';ctx.fillText(mode==='pvai'?'AI Character':'Player 2',sx,425);C.forEach((ch,i)=>card(sx+i*(w+g),445,w,h,ch,p2c===i,mode==='pvai'?'AI':'P2',()=>p2c=i));if(mode==='pvai')button(cvs.width-320,125,280,66,'AI: '+D[diff].name,'click to cycle',()=>diff=(diff+1)%3,true);button(cvs.width/2-270,695,260,52,'RANDOM','or press X',randomize,false);button(cvs.width/2+10,695,260,52,'START','Enter',start,true);button(30,695,180,52,'BACK','M/Esc',menu,false);ctx.fillStyle='#ffffffbb';ctx.font='15px Arial';ctx.textAlign='center';ctx.fillText('P1: WASD F/G/T.  P2: arrows / . Enter.  Double jump enabled.',cvs.width/2,785);ctx.restore()}
function particle(x,y,col,vx,vy,life=28,size=4){parts.push({x,y,vx,vy,life,max:life,size,col})}function spark(x,y,col,n=18,s=3){for(let i=0;i<n;i++){let a=Math.random()*Math.PI*2,v=Math.random()*s+1;particle(x,y,col,Math.cos(a)*v,Math.sin(a)*v,22+Math.random()*12,2+Math.random()*4)}}function burst(o,n=40,s=5){spark(mid(o),o.y+25,o.ch.color,n,s);for(let i=0;i<10;i++)particle(mid(o),o.y+10,o.ch.accent,(Math.random()-.5)*3,-Math.random()*5,40,5)}function trail(o,col){after.push({x:o.x,y:o.y,w:o.w,h:o.h,face:o.face,col,life:18,max:18})}function floatText(x,y,t,col='white'){texts.push({x,y,t,col,life:45})}
function box(o){let w=o.ch.range+(o.combo===4?18:0);return{x:o.face===1?o.x+o.w:o.x-w,y:o.y+18,w,h:52}}function rushBox(o){let w=92;return{x:o.face===1?o.x+o.w:o.x-w,y:o.y+10,w,h:72}}function slamBox(o){return{x:mid(o)-190,y:ground()-75,w:380,h:75}}function ov(a,b){return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y}
function hurt(o,e,dmg,kb,up=-4,st=16){e.hp=Math.max(0,e.hp-dmg);e.vx=o.face*kb;e.vy=up;e.stun=Math.max(e.stun,st);spark(mid(e),e.y+35,o.ch.accent,22,4);floatText(mid(e),e.y-45,'-'+Math.round(dmg),o.ch.color);freeze=5;if(e.hp<=0)screen='over'}
function m1(o){if(o.cd||o.stun||o.state)return;if(o.reset<=0)o.combo=0;o.combo=o.combo%4+1;o.atk=o.combo===4?18:13;o.cd=o.ch.cd+(o.combo===4?8:0);if(o.buff)o.cd=Math.max(7,o.cd-5);if(o.ch.name==='VinnyIsGood')o.cd=Math.max(8,o.cd-3);if(o.ch.name==='Gecko85'&&o.combo===1)o.vx+=o.face*3;o.reset=46;o.did=0;spark(mid(o)+o.face*18,o.y+34,o.ch.color,10,2.5)}
function hitCheck(o,e){if(o.did||!ov(box(o),e))return;o.did=1;let dmg=o.ch.dmg[o.combo-1],kb=o.ch.kb||7;if(o.buff&&o.ch.name==='VinnyIsGood')dmg*=2;if(o.ch.kind==='tag'&&o.combo===4)dmg+=2;if(e.block&&e.face===-o.face&&e.vy===0){dmg=Math.ceil(dmg*.35);kb*=.35;spark(mid(e),e.y+35,'#fff',8,2)}hurt(o,e,dmg,kb,o.combo===4?-7:-3,o.combo===4?18:10)}
function special(o,e){if(o.spec||o.stun||o.state)return;o.spec=210;if(o.ch.name==='Gecko85'){o.state='rush';o.t=42;o.did=0;o.vx=o.face*13;o.vy=-1;trail(o,o.ch.color);spark(mid(o),o.y+35,o.ch.accent,35,5)}else if(o.ch.name==='Ripple'){o.state='slam';o.t=40;o.vx=0;o.vy=-15;spark(mid(o),o.y+35,o.ch.accent,30,5);floatText(mid(o),o.y-40,'RIPPLE!',o.ch.color)}else if(o.ch.name==='VinnyIsGood'){o.buff=240;o.rank=1;o.max=o.base*2;o.hp=o.max;o.cd=0;o.reset=60;spark(mid(o),o.y+35,o.ch.accent,60,6);floatText(mid(o),o.y-45,'RANKED RUSH',o.ch.color)}else if(o.ch.kind==='tag'){o.state='pincer';o.t=66;e.stun=Math.max(e.stun,20);rush.push({t:66,o,e});spark(mid(e),e.y+35,o.ch.accent,34,5);floatText(mid(e),e.y-45,'TAG!',o.ch.color)}else{o.state='gearcast';o.t=55;fields.push({owner:o,x:e.x-130,y:ground()-15,w:260,h:18,t:90,col:o.ch.accent});for(let i=0;i<10;i++)gears.push({owner:o,x:e.x-300+i*70+Math.random()*30,y:-90-Math.random()*220,vy:5+Math.random()*2.5,r:23+Math.random()*14,rot:Math.random()*6.28,life:170,hit:0,col:o.ch.accent});spark(mid(e),ground()-90,o.ch.accent,38,5);floatText(mid(o),o.y-45,'GEARFALL',o.ch.color)}}
function runState(o,e){if(!o.state)return false;o.t--;if(o.state==='rush'){o.vx=o.face*13;trail(o,o.ch.color);if(ov(rushBox(o),e)&&!o.did){o.did=1;e.stun=Math.max(e.stun,42);e.vx=0;e.vy=0;hurt(o,e,23,3,-2,42);o.vx=-o.face*5;o.state=null;spark(mid(e),e.y+35,o.ch.accent,45,5)}if(o.t<=0)o.state=null;return true}if(o.state==='slam'){o.vy+=o.t>14?1.2:3.7;if(o.y+o.h>=ground()){o.y=ground()-o.h;o.vy=0;if(Math.abs(mid(e)-mid(o))<190)hurt(o,e,20,10,-9,26);for(let i=0;i<70;i++){let a=i/70*6.28;particle(mid(o),ground()-5,o.ch.accent,Math.cos(a)*(2+Math.random()*7),-Math.abs(Math.sin(a))*(1+Math.random()*5),34,3+Math.random()*5)}freeze=8;o.state=null}return true}if(o.state==='pincer'){if(o.t%7===0&&o.t>9){e.hp=Math.max(0,e.hp-2);e.stun=Math.max(e.stun,8);e.vx=(o.t%14===0?1:-1)*4;spark(mid(e),e.y+35,o.ch.accent,10,3);freeze=2}if(o.t===9){e.hp=Math.max(0,e.hp-8);e.vx=o.face*12;e.vy=-7;e.stun=22;spark(mid(e),e.y+35,o.ch.accent,30,5);floatText(mid(e),e.y-45,'FINISH',o.ch.color);freeze=6}if(o.t<=0)o.state=null;return false}if(o.state==='gearcast'){if(o.t<=0)o.state=null;return false}return false}
function input(o){return{l:keys[o.ctrl.l],r:keys[o.ctrl.r],j:keys[o.ctrl.j],m:keys[o.ctrl.m],b:keys[o.ctrl.b],s:keys[o.ctrl.s]}}function bot(o,e){let d=D[diff];if(d.name==='Dummy')return{};let dis=mid(e)-mid(o),ab=Math.abs(dis),q={};if(ab>o.ch.range){q.l=dis<0;q.r=dis>0}else if(ab<35){q.l=dis>0;q.r=dis<0}if(ab<o.ch.range+35&&Math.random()<d.atk)q.m=1;if(o.spec<=0&&Math.random()<d.spec)q.s=1;if(o.y+o.h>=ground()&&Math.random()<.012)q.j=1;return q}
function step(o,e,q){o.block=!!q.b;if(o.stun<=0&&!runState(o,e)){if(q.l){o.vx-=.75;o.face=-1}if(q.r){o.vx+=.75;o.face=1}if(q.j&&!o.jHeld&&o.jumps>0){o.vy=-16;o.jumps--;spark(mid(o),o.y+55,o.ch.accent,12,2)}o.jHeld=!!q.j;if(q.m)m1(o);if(q.s)special(o,e)}else if(o.stun>0)o.state=null;let boost=o.spawn>0?1.35:1;if(o.buff&&o.ch.name==='VinnyIsGood')boost*=1.5;else if(o.buff)boost*=1.18;o.vx=clamp(o.vx,-o.ch.spd*boost,o.ch.spd*boost);o.vy+=.78;o.lastX=o.x;o.x+=o.vx;o.y+=o.vy;o.vx*=o.y+o.h>=ground()?.78:.93;if(o.y+o.h>=ground()){o.y=ground()-o.h;o.vy=0;o.jumps=2}o.x=clamp(o.x,20,cvs.width-o.w-20);if(o.atk>0){let elapsed=(o.combo===4?18:13)-o.atk;if(elapsed>=3&&elapsed<=(o.combo===4?13:9))hitCheck(o,e)}o.atk=Math.max(0,o.atk-1);o.cd=Math.max(0,o.cd-1);o.reset=Math.max(0,o.reset-1);o.stun=Math.max(0,o.stun-1);o.spec=Math.max(0,o.spec-1);o.buff=Math.max(0,o.buff-1);if(o.rank&&o.buff<=0){o.rank=0;o.max=o.base;o.hp=Math.min(o.hp,o.base)}o.spawn=Math.max(0,o.spawn-1);o.spawnAnim=Math.max(0,o.spawnAnim-1);o.anim+=Math.abs(o.x-o.lastX)*.12+(o.y+o.h<ground()?.18:.05)}
function drawHitbox(b,col){ctx.save();ctx.fillStyle=col;ctx.strokeStyle='white';ctx.lineWidth=2;ctx.globalAlpha=.2;ctx.fillRect(b.x,b.y,b.w,b.h);ctx.globalAlpha=.68;ctx.strokeRect(b.x,b.y,b.w,b.h);ctx.restore()}function drawGear(g){ctx.save();ctx.translate(g.x,g.y);ctx.rotate(g.rot);ctx.strokeStyle=g.col;ctx.fillStyle='#ffffff18';ctx.lineWidth=4;ctx.beginPath();for(let i=0;i<12;i++){let a=i*Math.PI*2/12,r=i%2?g.r:g.r*.72;ctx.lineTo(Math.cos(a)*r,Math.sin(a)*r)}ctx.closePath();ctx.fill();ctx.stroke();ctx.beginPath();ctx.arc(0,0,g.r*.35,0,Math.PI*2);ctx.stroke();ctx.restore()}
function updateGears(){for(let f of fields){f.t--;for(let o of[A,B])if(o!==f.owner&&o.x+o.w>f.x&&o.x<f.x+f.w&&o.y+o.h>=f.y){o.stun=Math.max(o.stun,8);o.vx*=.78}}fields=fields.filter(f=>f.t>0);for(let g of gears){g.y+=g.vy;g.vy+=.25;g.rot+=.16;g.life--;for(let o of[A,B])if(o!==g.owner&&!g.hit&&Math.abs(mid(o)-g.x)<g.r+20&&Math.abs(o.y+35-g.y)<g.r+40){g.hit=1;hurt(g.owner,o,12,8,-8,18);spark(g.x,g.y,g.col,24,4)}if(g.y>ground()-10&&!g.hit){g.hit=1;spark(g.x,ground()-10,g.col,18,3)}}gears=gears.filter(g=>g.life>0&&g.y<cvs.height+90)}
function drawWeapon(o){ctx.strokeStyle=o.ch.accent;ctx.lineWidth=o.ch.kind==='tag'||o.ch.kind==='staff'?6:4;ctx.lineCap='round';let r=(o.atk?34:23)+(o.combo||1)*3,d=o.face;ctx.beginPath();if(o.ch.kind==='dual'){ctx.moveTo(d*4,-9);ctx.lineTo(d*r,-12);ctx.moveTo(d*4,9);ctx.lineTo(d*r,12)}else if(o.ch.kind==='staff'){ctx.moveTo(d*5,-17);ctx.lineTo(d*r,17)}else if(o.ch.kind==='tag'){ctx.moveTo(d*5,-8);ctx.lineTo(d*r,6);ctx.moveTo(d*20,14);ctx.lineTo(d*(r+10),-10)}else{ctx.moveTo(d*5,-4);ctx.lineTo(d*r,5)}ctx.stroke()}
function oneBody(o,off=0,col=null,mini=false){let bob=Math.sin(o.anim)*3,run=Math.sin(o.anim*2)*5;ctx.save();ctx.translate(mid(o)+off*o.face,o.y+o.h/2+bob);if(o.stun)ctx.translate(Math.sin(time*.5)*3,0);ctx.fillStyle='#0008';ctx.beginPath();ctx.ellipse(0,47-bob,28,8,0,0,Math.PI*2);ctx.fill();let c=col||o.ch.color;ctx.fillStyle=o.stun?'#fff':c;ctx.fillRect(-16,-22,32,50);ctx.fillStyle=c;ctx.beginPath();ctx.arc(0,-34,16,0,Math.PI*2);ctx.fill();ctx.fillStyle='#111';ctx.fillRect(o.face*4,-38,9*o.face,4);ctx.strokeStyle=c;ctx.lineWidth=5;ctx.beginPath();ctx.moveTo(-8,26);ctx.lineTo(-12-run*.2,44);ctx.moveTo(8,26);ctx.lineTo(12+run*.2,44);ctx.stroke();drawWeapon(o);if(o.block){ctx.strokeStyle='#fff9';ctx.lineWidth=3;ctx.beginPath();ctx.arc(o.face*28,0,18,-1.2,1.2);ctx.stroke()}ctx.restore()}
function drawGuy(o){if(o.ch.kind==='tag'){oneBody(o,-17,o.ch.color);oneBody(o,19,o.ch.alt);ctx.fillStyle='#fffc';ctx.font='10px Arial';ctx.textAlign='center';ctx.fillText('TAG',mid(o),o.y-20)}else oneBody(o);if(o.spawnAnim>0){ctx.strokeStyle=o.ch.accent;ctx.globalAlpha=o.spawnAnim/70;ctx.lineWidth=4;ctx.beginPath();ctx.arc(mid(o),o.y+25,70-o.spawnAnim*.45,0,Math.PI*2);ctx.stroke();ctx.globalAlpha=1}ctx.textAlign='center';if(o.stun>0){ctx.fillStyle='#ffef7a';ctx.font='900 13px Arial';ctx.fillText('STUN '+(o.stun/60).toFixed(1)+'s',mid(o),o.y-34)}if(o.spawn>0){ctx.fillStyle=o.ch.accent;ctx.font='12px Arial';ctx.fillText('SPAWN BOOST '+Math.ceil(o.spawn/60),mid(o),o.y-20)}else if(o.buff&&o.ch.name==='VinnyIsGood'){ctx.fillStyle=o.ch.accent;ctx.font='900 12px Arial';ctx.fillText('RANKED RUSH '+Math.ceil(o.buff/60),mid(o),o.y-20)}if(o.reset>0){ctx.fillStyle='white';ctx.font='13px Arial';ctx.fillText('M1-'+o.combo,mid(o),o.y-8)}}
function drawFX(){for(let a of after){ctx.globalAlpha=a.life/a.max*.35;ctx.fillStyle=a.col;ctx.fillRect(a.x,a.y,a.w,a.h);ctx.globalAlpha=1;a.life--}after=after.filter(a=>a.life>0);for(let p of parts){p.x+=p.vx;p.y+=p.vy;p.vy+=.08;p.life--}parts=parts.filter(p=>p.life>0);for(let p of parts){ctx.globalAlpha=Math.max(0,p.life/p.max);ctx.fillStyle=p.col;ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1}for(let t of texts){t.y-=.7;t.life--;ctx.globalAlpha=Math.max(0,t.life/45);ctx.fillStyle=t.col;ctx.font='900 18px Arial';ctx.textAlign='center';ctx.fillText(t.t,t.x,t.y);ctx.globalAlpha=1}texts=texts.filter(t=>t.life>0)}
function fight(){zones=[];bg();for(let f of fields){ctx.fillStyle=f.col;ctx.globalAlpha=.22;ctx.fillRect(f.x,f.y,f.w,f.h);ctx.globalAlpha=1;drawHitbox({x:f.x,y:f.y-55,w:f.w,h:70},f.owner.ch.color)}for(let g of gears){drawGear(g);drawHitbox({x:g.x-g.r,y:g.y-g.r,w:g.r*2,h:g.r*2},g.owner.ch.color)}for(let r of rush){r.t--;let x=mid(r.e),y=r.e.y+35;ctx.globalAlpha=Math.max(0,r.t/66);ctx.strokeStyle=r.o.ch.color;ctx.lineWidth=7;ctx.beginPath();ctx.moveTo(x-130,y-24);ctx.lineTo(x+5,y);ctx.stroke();ctx.strokeStyle=r.o.ch.alt||r.o.ch.accent;ctx.beginPath();ctx.moveTo(x+130,y+24);ctx.lineTo(x-5,y);ctx.stroke();ctx.globalAlpha=1;drawHitbox({x:x-145,y:y-45,w:290,h:90},r.o.ch.color)}rush=rush.filter(r=>r.t>0);if(A&&A.atk>0)drawHitbox(box(A),A.ch.color);if(B&&B.atk>0)drawHitbox(box(B),B.ch.color);if(A&&A.state==='rush')drawHitbox(rushBox(A),A.ch.color);if(B&&B.state==='rush')drawHitbox(rushBox(B),B.ch.color);if(A&&A.state==='slam')drawHitbox(slamBox(A),A.ch.color);if(B&&B.state==='slam')drawHitbox(slamBox(B),B.ch.color);tip.textContent=screen==='over'?(A.hp<=0?(B.ai?'AI wins':'P2 wins'):'P1 wins')+' - R menu':(mode==='pvai'?'PvAI | polished hitboxes visible':'PvP | polished hitboxes visible');if(freeze>0)freeze--;else if(screen==='fight'){step(A,B,input(A));step(B,A,B.ai?bot(B,A):input(B));updateGears()}if(Math.abs(A.x-B.x)>10&&!A.state)A.face=A.x<B.x?1:-1;if(Math.abs(B.x-A.x)>10&&!B.state)B.face=B.x<A.x?1:-1;drawFX();drawGuy(A);drawGuy(B);if(A.hp<=0||B.hp<=0)screen='over';h1.style.width=A.hp/A.max*100+'%';h2.style.width=B.hp/B.max*100+'%';h1.style.background=`linear-gradient(90deg,${A.ch.color},${A.ch.accent})`;h2.style.background=`linear-gradient(90deg,${B.ch.color},${B.ch.accent})`;s1.textContent=Math.ceil(A.hp)+'/'+A.max;s2.textContent=Math.ceil(B.hp)+'/'+B.max;b1.textContent=(A.spec?('Special CD '+Math.ceil(A.spec/60)+'s'):'Special ready')+(A.jumps<2?' • jumps '+A.jumps:'');b2.textContent=(B.spec?('Special CD '+Math.ceil(B.spec/60)+'s'):'Special ready')+(B.jumps<2?' • jumps '+B.jumps:'')}
function loop(){time++;if(screen==='menu')drawMenu();else if(screen==='select')drawSelect();else fight();requestAnimationFrame(loop)}loop();
</script></body></html>
