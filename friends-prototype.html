<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Friends Battlegrounds Prototype</title>
<style>
  html,body{margin:0;overflow:hidden;background:#0b0e14;color:white;font-family:Arial,sans-serif}
  canvas{display:block;background:linear-gradient(#182034,#111722 65%,#191919 65%)}
  #hud{position:fixed;top:12px;left:12px;right:12px;display:none;justify-content:space-between;pointer-events:none;gap:20px}
  .box{width:42%;padding:8px 10px;background:rgba(0,0,0,.45);border:2px solid rgba(255,255,255,.2);border-radius:10px}
  .name{font-weight:bold;margin-bottom:5px}.bar{height:18px;background:#333;border-radius:99px;overflow:hidden}.fill{height:100%;width:100%}
  #tip{position:fixed;top:14px;left:0;right:0;text-align:center;font-weight:bold;text-shadow:0 2px 6px black;pointer-events:none}
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="hud"><div class="box"><div id="n1" class="name">P1</div><div class="bar"><div id="h1" class="fill"></div></div></div><div class="box"><div id="n2" class="name" style="text-align:right">P2</div><div class="bar"><div id="h2" class="fill"></div></div></div></div>
<div id="tip"></div>
<script>
const canvas=document.getElementById('game'),ctx=canvas.getContext('2d');
const hud=document.getElementById('hud'),tip=document.getElementById('tip'),n1=document.getElementById('n1'),n2=document.getElementById('n2'),h1=document.getElementById('h1'),h2=document.getElementById('h2');
function resize(){canvas.width=innerWidth;canvas.height=innerHeight} addEventListener('resize',resize); resize();
const keys={}; let zones=[],screen='mode',mode='pvp',p1Pick=0,p2Pick=1,diff=1,p1,p2,particles=[],zonesFx=[],hitstop=0,scroll=0,aiMemory={};
addEventListener('keydown',e=>{const k=e.key.toLowerCase();keys[k]=true;if(['arrowleft','arrowright','arrowup','arrowdown',' ','enter'].includes(k))e.preventDefault();if(screen==='mode')modeKeys(k);else if(screen==='select')selectKeys(k);else if((screen==='fight'||screen==='over')&&k==='r')goMode()});
addEventListener('keyup',e=>keys[e.key.toLowerCase()]=false);
addEventListener('wheel',e=>{if(screen==='select'){scroll=Math.max(0,Math.min(290,scroll+e.deltaY));e.preventDefault()}},{passive:false});
addEventListener('mousedown',e=>{const r=canvas.getBoundingClientRect(),x=e.clientX-r.left,y=e.clientY-r.top+(screen==='select'?scroll:0);for(let i=zones.length-1;i>=0;i--){const z=zones[i];if(x>=z.x&&x<=z.x+z.w&&y>=z.y&&y<=z.y+z.h){z.fn();break}}});
const roster=[
 {id:'gecko85',name:'Gecko85',role:'slippery movement main',weapon:'Tailhook Dagger',tech:'Sticky Step',special:'Gecko Leap',color:'#7cff4f',accent:'#e0ffd7',hp:105,speed:6.4,jump:16,range:58,cool:14,dmg:[6,7,9,15],kb:6,kind:'dagger'},
 {id:'ripple',name:'Ripple',role:'balanced Roblox all-rounder',weapon:'Wave Saber',tech:'Adaptive Flow',special:'Ripple Burst',color:'#4cc9ff',accent:'#daf5ff',hp:112,speed:5.4,jump:15,range:66,cool:18,dmg:[7,8,10,16],kb:7,kind:'sword'},
 {id:'vinny',name:'VinnyIsGood',role:'sweat and grinder pressure',weapon:'Ranked Dual Blades',tech:'Grind Mode',special:'Ranked Rush',color:'#ffcc33',accent:'#fff3bd',hp:95,speed:6.8,jump:15,range:60,cool:13,dmg:[6,7,10,18],kb:7.5,kind:'dual'},
 {id:'fishred',name:'Fishies + RedstoneMech',role:'two-character tag team',weapon:'Hook Blade + Redstone Gauntlet',tech:'Tag Combo',special:'Pincer Strike',color:'#ff5f5f',accent:'#ffd0d0',partner:'#ff3030',hp:118,speed:5.8,jump:15,range:70,cool:17,dmg:[7,8,11,20],kb:8.5,kind:'tag'},
 {id:'sapphire',name:'SapphirePangolin',role:'creative redstoner admin',weapon:'Command Wrench',tech:'Admin Override',special:'Redstone Lock',color:'#8d7cff',accent:'#e3ddff',hp:125,speed:4.7,jump:14,range:84,cool:22,dmg:[6,8,12,17],kb:9,kind:'staff'}
];
const diffs=[{name:'Dummy',reaction:999,attack:0,block:0,special:0},{name:'Normal AI',reaction:22,attack:.55,block:.18,special:.012},{name:'Power Insane',reaction:5,attack:.95,block:.65,special:.035}];
function ground(){return canvas.height*.72} function clamp(v,a,b){return Math.max(a,Math.min(b,v))} function hit(a,b){return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y}
function btn(x,y,w,h,text,sub,fn,on=false){zones.push({x,y,w,h,fn});ctx.fillStyle=on?'rgba(255,255,255,.24)':'rgba(0,0,0,.4)';ctx.strokeStyle=on?'#fff':'rgba(255,255,255,.25)';ctx.lineWidth=on?3:2;ctx.beginPath();ctx.roundRect(x,y,w,h,14);ctx.fill();ctx.stroke();ctx.fillStyle='white';ctx.font='bold 22px Arial';ctx.textAlign='center';ctx.fillText(text,x+w/2,y+34);if(sub){ctx.fillStyle='rgba(255,255,255,.72)';ctx.font='14px Arial';ctx.fillText(sub,x+w/2,y+58)}}
function goMode(){screen='mode';hud.style.display='none';scroll=0} function goSelect(){screen='select';hud.style.display='none';scroll=0}
function modeKeys(k){if(k==='1'){mode='pvp';goSelect()} if(k==='2'){mode='pvai';goSelect()} if(k==='arrowup'||k==='w')diff=(diff+diffs.length-1)%diffs.length;if(k==='arrowdown'||k==='s')diff=(diff+1)%diffs.length;if(k==='enter')goSelect()}
function selectKeys(k){if(k==='a')p1Pick=(p1Pick+roster.length-1)%roster.length;if(k==='d')p1Pick=(p1Pick+1)%roster.length;if(k==='arrowleft')p2Pick=(p2Pick+roster.length-1)%roster.length;if(k==='arrowright')p2Pick=(p2Pick+1)%roster.length;if(k==='q')diff=(diff+diffs.length-1)%diffs.length;if(k==='e')diff=(diff+1)%diffs.length;if(k==='enter')start();if(k==='m'||k==='escape')goMode()}
function make(x,facing,c,controls,num,ai=false){return{num,ai,c,x,y:ground()-82,w:38,h:82,vx:0,vy:0,face:facing,hp:c.hp,max:c.hp,atk:0,cd:0,combo:0,reset:0,hit:false,hurt:0,block:false,spec:0,specCd:0,buff:0,controls}}
function start(){screen='fight';hud.style.display='flex';particles=[];zonesFx=[];hitstop=0;aiMemory={};p1=make(180,1,roster[p1Pick],{l:'a',r:'d',j:'w',a:'f',b:'g',s:'t'},1,false);p2=make(canvas.width-220,-1,roster[p2Pick],{l:'arrowleft',r:'arrowright',j:'arrowup',a:'/',b:'.',s:'enter'},2,mode==='pvai');n1.textContent='P1: '+p1.c.name;n2.textContent=(p2.ai?'AI '+diffs[diff].name+': ':'P2: ')+p2.c.name}
function box(f){const extra=f.combo===4?18:0;const w=f.c.range+extra;return{x:f.face===1?f.x+f.w:f.x-w,y:f.y+18,w,h:52}}
function m1(f){if(f.cd>0||f.hurt>0)return;if(f.reset<=0)f.combo=0;f.combo=f.combo%4+1;f.atk=f.combo===4?18:13;f.cd=f.c.cool+(f.combo===4?8:0);if(f.buff>0)f.cd=Math.max(7,f.cd-5);f.reset=46;f.hit=false;if(f.c.id==='gecko85'&&f.combo===1)f.vx+=f.face*3;if(f.c.id==='vinny')f.cd=Math.max(8,f.cd-3)}
function special(f,enemy){if(f.specCd>0||f.hurt>0)return;f.specCd=240;f.spec=32;let cx=f.x+f.w/2,cy=f.y+35;if(f.c.id==='gecko85'){f.vx+=f.face*13;f.vy=-5;spawn(cx,cy,f.c.accent,25,5)}
 else if(f.c.id==='ripple'){spawn(cx,cy,f.c.accent,40,5);if(Math.abs((enemy.x+enemy.w/2)-cx)<145&&Math.abs(enemy.y-f.y)<90){enemy.hp=Math.max(0,enemy.hp-15);enemy.vx=f.face*9;enemy.hurt=18}}
 else if(f.c.id==='vinny'){f.buff=180;spawn(cx,cy,f.c.accent,35,4)}
 else if(f.c.id==='fishred'){spawn(enemy.x+enemy.w/2,enemy.y+35,f.c.accent,45,5);enemy.hp=Math.max(0,enemy.hp-18);enemy.vx=f.face*12;enemy.vy=-6;enemy.hurt=22;hitstop=8}
 else if(f.c.id==='sapphire'){zonesFx.push({owner:f,x:enemy.x-30,y:ground()-18,w:110,h:18,life:150,armed:18,color:f.c.accent});spawn(enemy.x+enemy.w/2,ground()-20,f.c.accent,30,4)}
 if(enemy.hp<=0)screen='over'}
function damage(a,d){if(a.hit||!hit(box(a),d))return;a.hit=true;let dmg=a.c.dmg[a.combo-1],kb=a.c.kb;if(a.c.id==='fishred'&&a.combo===4)dmg+=5;if(a.c.id==='sapphire'&&a.combo===4){d.hurt+=8;spawn(d.x+d.w/2,d.y+25,a.c.accent,26,4)}if(d.block&&d.face===-a.face&&d.vy===0){dmg=Math.ceil(dmg*.35);kb*=.35;spawn(d.x+d.w/2,d.y+35,'#fff',8,2)}else{d.hurt=a.combo===4?24:13;hitstop=a.combo===4?7:4;spawn(d.x+d.w/2,d.y+35,a.c.accent,a.combo===4?18:10,3)}d.hp=Math.max(0,d.hp-dmg);d.vx=a.face*kb*(a.combo===4?1.55:1);d.vy=a.combo===4?-7:-3;if(d.hp<=0)screen='over'}
function spawn(x,y,color,n,speed){for(let i=0;i<n;i++){let a=Math.random()*Math.PI*2,s=Math.random()*speed+1;particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:25,size:3+Math.random()*4,color})}}
function input(f){return{l:!!keys[f.controls.l],r:!!keys[f.controls.r],j:!!keys[f.controls.j],a:!!keys[f.controls.a],b:!!keys[f.controls.b],s:!!keys[f.controls.s]}}
function aiInput(ai,enemy){const d=diffs[diff];if(d.name==='Dummy')return{l:0,r:0,j:0,a:0,b:0,s:0};aiMemory.t=(aiMemory.t||0)+1;if(aiMemory.t%d.reaction!==0&&d.name!=='Power Insane')return aiMemory.last||{l:0,r:0,j:0,a:0,b:0,s:0};let dist=enemy.x-ai.x,abs=Math.abs(dist),inp={l:0,r:0,j:0,a:0,b:0,s:0};if(abs>ai.c.range*.95){inp.l=dist<0;inp.r=dist>0}else if(abs<35){inp.l=dist>0;inp.r=dist<0}if(abs<ai.c.range+30&&Math.random()<d.attack)inp.a=1;if(enemy.atk>0&&abs<enemy.c.range+45&&Math.random()<d.block)inp.b=1;if(ai.specCd<=0&&Math.random()<d.special)inp.s=1;aiMemory.last=inp;return inp}
function step(f,enemy,inp){f.block=!!inp.b;if(f.hurt<=0){if(inp.l){f.vx-=.75;f.face=-1}if(inp.r){f.vx+=.75;f.face=1}if(inp.j&&f.y+f.h>=ground()){f.vy=-f.c.jump}if(inp.a)m1(f);if(inp.s)special(f,enemy)}f.vx=clamp(f.vx,-f.c.speed*(f.buff>0?1.18:1),f.c.speed*(f.buff>0?1.18:1));f.vy+=.78;f.x+=f.vx;f.y+=f.vy;f.vx*=f.y+f.h>=ground()?.78:.93;if(f.y+f.h>=ground()){f.y=ground()-f.h;f.vy=0}f.x=clamp(f.x,20,canvas.width-f.w-20);if(f.atk>0){let elapsed=(f.combo===4?18:13)-f.atk;if(elapsed>=3&&elapsed<=(f.combo===4?13:9))damage(f,enemy)}f.atk=Math.max(0,f.atk-1);f.cd=Math.max(0,f.cd-1);f.reset=Math.max(0,f.reset-1);f.hurt=Math.max(0,f.hurt-1);f.spec=Math.max(0,f.spec-1);f.specCd=Math.max(0,f.specCd-1);f.buff=Math.max(0,f.buff-1)}
function updateZones(a,b){for(const z of zonesFx){z.life--; if(z.armed<=0){for(const f of [a,b]){if(f!==z.owner&&f.x+f.w>z.x&&f.x<z.x+z.w&&f.y+f.h>=z.y){f.hurt=Math.max(f.hurt,24);f.vx+=(f.x<z.x? -7:7);f.hp=Math.max(0,f.hp-10);spawn(f.x+f.w/2,f.y+30,z.color,20,3)}}} z.armed--} zonesFx=zonesFx.filter(z=>z.life>0);}
function stage(){ctx.clearRect(0,0,canvas.width,canvas.height);ctx.fillStyle='rgba(255,255,255,.04)';for(let i=0;i<9;i++)ctx.fillRect(i*190-((Date.now()/80)%190),70,80,canvas.height*.55);ctx.fillStyle='#202020';ctx.fillRect(0,ground(),canvas.width,canvas.height-ground());ctx.fillStyle='rgba(255,255,255,.08)';ctx.fillRect(0,ground(),canvas.width,4);for(const z of zonesFx){ctx.globalAlpha=.35;ctx.fillStyle=z.color;ctx.fillRect(z.x,z.y,z.w,z.h);ctx.globalAlpha=1}}
function drawWeapon(f){ctx.strokeStyle=f.c.accent;ctx.lineWidth=f.c.kind==='staff'||f.c.kind==='tag'?6:4;ctx.lineCap='round';let r=(f.atk>0?32:22)+(f.combo||1)*3,d=f.face;ctx.beginPath();if(f.c.kind==='dual'){ctx.moveTo(d*5,-8);ctx.lineTo(d*r,-10);ctx.moveTo(d*5,8);ctx.lineTo(d*r,10)}else if(f.c.kind==='staff'){ctx.moveTo(d*5,-15);ctx.lineTo(d*r,15)}else if(f.c.kind==='tag'){ctx.moveTo(d*5,-8);ctx.lineTo(d*r,6);ctx.moveTo(d*20,14);ctx.lineTo(d*(r+10),-10)}else{ctx.moveTo(d*5,-4);ctx.lineTo(d*r,5)}ctx.stroke()}
function body(f,off=0,col=null){ctx.save();ctx.translate(f.x+f.w/2+off*f.face,f.y+f.h/2);if(f.hurt>0)ctx.translate(Math.sin(Date.now()/22)*3,0);ctx.fillStyle='rgba(0,0,0,.35)';ctx.beginPath();ctx.ellipse(0,f.h/2+5,30,8,0,0,Math.PI*2);ctx.fill();ctx.fillStyle=f.hurt>0?'#fff':(col||f.c.color);ctx.beginPath();ctx.roundRect(-17,-23,34,54,8);ctx.fill();ctx.beginPath();ctx.arc(0,-33,16,0,Math.PI*2);ctx.fill();ctx.fillStyle='#111';ctx.fillRect(f.face*5,-37,8*f.face,4);drawWeapon(f);if(f.block){ctx.strokeStyle='rgba(255,255,255,.7)';ctx.lineWidth=3;ctx.beginPath();ctx.arc(f.face*27,1,18,-1.2,1.2);ctx.stroke()}ctx.restore()}
function fighter(f,preview=false){if(f.c.id==='fishred'){body(f,-16,f.c.color);body(f,18,f.c.partner);ctx.fillStyle='rgba(255,255,255,.75)';ctx.font='10px Arial';ctx.textAlign='center';ctx.fillText('TAG',f.x+f.w/2,f.y-20)}else body(f,0);if(f.spec>0){ctx.strokeStyle=f.c.accent;ctx.globalAlpha=.45;ctx.lineWidth=3;ctx.beginPath();ctx.arc(f.x+f.w/2,f.y+35,45-f.spec,0,Math.PI*2);ctx.stroke();ctx.globalAlpha=1}if(!preview&&f.reset>0){ctx.fillStyle='white';ctx.font='13px Arial';ctx.textAlign='center';ctx.fillText(f.c.tech+' M1-'+f.combo,f.x+f.w/2,f.y-12)}if(!preview&&f.buff>0){ctx.fillStyle=f.c.accent;ctx.font='12px Arial';ctx.textAlign='center';ctx.fillText('BUFF',f.x+f.w/2,f.y-28)}}
function particlesStep(){for(const p of particles){p.x+=p.vx;p.y+=p.vy;p.vy+=.08;p.life--}particles=particles.filter(p=>p.life>0);for(const p of particles){ctx.globalAlpha=p.life/25;ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1}}
function card(x,y,w,h,c,on,label,fn){zones.push({x,y,w,h,fn});ctx.fillStyle=on?'rgba(255,255,255,.22)':'rgba(0,0,0,.4)';ctx.strokeStyle=on?c.color:'rgba(255,255,255,.25)';ctx.lineWidth=on?4:2;ctx.beginPath();ctx.roundRect(x,y,w,h,16);ctx.fill();ctx.stroke();ctx.textAlign='center';ctx.fillStyle=on?c.color:'white';ctx.font='bold 19px Arial';ctx.fillText(c.name,x+w/2,y+28);ctx.fillStyle='rgba(255,255,255,.72)';ctx.font='12px Arial';ctx.fillText(c.role,x+w/2,y+50);fighter({x:x+w/2-19,y:y+88,w:38,h:82,face:1,c,hurt:0,atk:1,combo:1,block:false,spec:0,buff:0},true);ctx.textAlign='left';ctx.fillStyle='rgba(255,255,255,.86)';ctx.font='12px Arial';ctx.fillText('Weapon: '+c.weapon,x+10,y+h-82);ctx.fillText('M1 Tech: '+c.tech,x+10,y+h-64);ctx.fillText('Special: '+c.special,x+10,y+h-46);ctx.fillText('HP '+c.hp+'  SPD '+c.speed,x+10,y+h-28);ctx.fillText('M1 '+c.dmg.join('/'),x+10,y+h-11);ctx.textAlign='center';ctx.fillStyle='white';ctx.font='bold 12px Arial';ctx.fillText(label,x+w/2,y+h-11)}
function drawMode(){zones=[];stage();tip.textContent='Prototype menu';ctx.textAlign='center';ctx.fillStyle='white';ctx.font='bold 44px Arial';ctx.fillText('FRIENDS BATTLEGROUNDS',canvas.width/2,105);ctx.font='17px Arial';ctx.fillStyle='rgba(255,255,255,.72)';ctx.fillText('Now with specials: P1 = T, P2 = Enter',canvas.width/2,135);let cx=canvas.width/2;btn(cx-330,190,300,90,'1  PvP','same keyboard',()=>{mode='pvp';goSelect()},mode==='pvp');btn(cx+30,190,300,90,'2  PvAI','fight a bot',()=>{mode='pvai';goSelect()},mode==='pvai');diffs.forEach((d,i)=>btn(cx-230,330+i*58,460,46,d.name,'AI difficulty',()=>{diff=i;mode='pvai'},diff===i));}
function drawSelect(){zones=[];stage();tip.textContent='Character Select - scroll if needed';ctx.save();ctx.translate(0,-scroll);ctx.textAlign='center';ctx.fillStyle='white';ctx.font='bold 42px Arial';ctx.fillText('PICK YOUR FRIEND FIGHTER',canvas.width/2,95);let w=Math.min(182,canvas.width/6.0),h=250,g=10,total=w*roster.length+g*(roster.length-1),sx=canvas.width/2-total/2;ctx.textAlign='left';ctx.font='bold 22px Arial';ctx.fillText('Player 1',sx,160);roster.forEach((c,i)=>card(sx+i*(w+g),180,w,h,c,p1Pick===i,'P1',()=>p1Pick=i));ctx.fillStyle='white';ctx.font='bold 22px Arial';ctx.fillText(mode==='pvai'?'AI Character':'Player 2',sx,470);roster.forEach((c,i)=>card(sx+i*(w+g),490,w,h,c,p2Pick===i,mode==='pvai'?'AI':'P2',()=>p2Pick=i));if(mode==='pvai')btn(canvas.width-330,130,285,66,'AI: '+diffs[diff].name,'click to cycle',()=>diff=(diff+1)%diffs.length,true);btn(canvas.width/2-130,765,260,52,'START','Enter',start,true);btn(30,765,180,52,'BACK','M/Esc',goMode,false);ctx.fillStyle='rgba(255,255,255,.72)';ctx.font='15px Arial';ctx.textAlign='center';ctx.fillText('Fight: P1 WASD/F/G/T special. P2 arrows///./Enter special. R menu.',canvas.width/2,845);ctx.restore();}
function fight(){zones=[];stage();tip.textContent=screen==='over'?(p1.hp<=0?(p2.ai?'AI wins':'P2 wins'):'P1 wins')+' - R menu':(mode==='pvai'?'PvAI | P1 special T':'PvP | P1 special T, P2 special Enter');if(hitstop>0)hitstop--;else if(screen==='fight'){step(p1,p2,input(p1));step(p2,p1,p2.ai?aiInput(p2,p1):input(p2));updateZones(p1,p2)}if(Math.abs(p1.x-p2.x)>10&&p1.atk<=0)p1.face=p1.x<p2.x?1:-1;if(Math.abs(p1.x-p2.x)>10&&p2.atk<=0)p2.face=p2.x<p1.x?1:-1;particlesStep();fighter(p1);fighter(p2);if(p1.hp<=0||p2.hp<=0)screen='over';h1.style.width=p1.hp/p1.max*100+'%';h2.style.width=p2.hp/p2.max*100+'%';h1.style.background=p1.c.color;h2.style.background=p2.c.color}
function loop(){if(screen==='mode')drawMode();else if(screen==='select')drawSelect();else fight();requestAnimationFrame(loop)}loop();
</script>
</body>
</html>
