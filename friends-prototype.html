<!doctype html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Friends Battlegrounds v5</title><style>html,body{margin:0;overflow:hidden;background:#090d14;color:white;font-family:Arial}canvas{display:block;background:linear-gradient(#182136,#111823 65%,#191919 65%)}#hud{position:fixed;top:12px;left:12px;right:12px;display:none;justify-content:space-between;gap:20px;pointer-events:none}.box{width:42%;background:rgba(0,0,0,.45);border:2px solid #ffffff33;border-radius:10px;padding:8px}.bar{height:18px;background:#333;border-radius:99px;overflow:hidden}.fill{height:100%;width:100%}#tip{position:fixed;top:14px;left:0;right:0;text-align:center;font-weight:bold;text-shadow:0 2px 6px black;pointer-events:none}</style></head><body><canvas id='game'></canvas><div id='hud'><div class='box'><b id='n1'>P1</b><div class='bar'><div id='h1' class='fill'></div></div></div><div class='box'><b id='n2' style='float:right'>P2</b><br><div class='bar'><div id='h2' class='fill'></div></div></div></div><div id='tip'></div><script>
const canvas=document.getElementById('game'),ctx=canvas.getContext('2d'),hud=document.getElementById('hud'),tip=document.getElementById('tip'),n1=document.getElementById('n1'),n2=document.getElementById('n2'),h1=document.getElementById('h1'),h2=document.getElementById('h2');
function size(){canvas.width=innerWidth;canvas.height=innerHeight}addEventListener('resize',size);size();
const R=[
{id:'gecko',name:'Gecko85',role:'movement main',weapon:'Tailhook Dagger',m1:'Sticky Step',sp:'Long Gecko Leap',c:'#7cff4f',a:'#e0ffd7',hp:105,spd:6.4,j:16,rg:58,cd:14,d:[6,7,9,15],kb:6,k:'dag'},
{id:'ripple',name:'Ripple',role:'balanced all-rounder',weapon:'Wave Saber',m1:'Adaptive Flow',sp:'Ripple Groundslam',c:'#4cc9ff',a:'#daf5ff',hp:112,spd:5.4,j:15,rg:66,cd:18,d:[7,8,10,16],kb:7,k:'sword'},
{id:'vinny',name:'VinnyIsGood',role:'sweat grinder',weapon:'Ranked Dual Blades',m1:'Grind Mode',sp:'Ranked Rush',c:'#ffcc33',a:'#fff3bd',hp:95,spd:6.8,j:15,rg:60,cd:13,d:[6,7,10,18],kb:7.5,k:'dual'},
{id:'tag',name:'Fishies + RedstoneMech',role:'true tag team',weapon:'Hook + Redstone Fist',m1:'Tag Combo',sp:'Pincer Combo',c:'#ff5f5f',a:'#ffd0d0',p:'#ff3030',hp:118,spd:5.8,j:15,rg:70,cd:17,d:[7,8,11,20],kb:8.5,k:'tag'},
{id:'sapphire',name:'SapphirePangolin',role:'redstone admin',weapon:'Command Wrench',m1:'Admin Override',sp:'Create Gearfall',c:'#8d7cff',a:'#e3ddff',hp:125,spd:4.7,j:14,rg:84,cd:22,d:[6,8,12,17],kb:9,k:'staff'}];
const D=[{name:'Dummy',r:999,a:0,b:0,s:0},{name:'Normal AI',r:22,a:.55,b:.18,s:.012},{name:'Power Insane',r:5,a:.95,b:.65,s:.035}];
let key={},zones=[],scr='mode',mode='pvp',pick1=0,pick2=1,diff=1,A,B,parts=[],gear=[],dash=[],freeze=0,scroll=0,mem={};
addEventListener('keydown',e=>{let k=e.key.toLowerCase();key[k]=1;if(['arrowleft','arrowright','arrowup','arrowdown',' ','enter'].includes(k))e.preventDefault();if(scr==='mode')modeKey(k);else if(scr==='select')selKey(k);else if((scr==='fight'||scr==='over')&&k==='r')goMode()});addEventListener('keyup',e=>key[e.key.toLowerCase()]=0);addEventListener('wheel',e=>{if(scr==='select'){scroll=Math.max(0,Math.min(300,scroll+e.deltaY));e.preventDefault()}},{passive:false});addEventListener('mousedown',e=>{let r=canvas.getBoundingClientRect(),x=e.clientX-r.left,y=e.clientY-r.top+(scr==='select'?scroll:0);for(let i=zones.length-1;i>=0;i--){let z=zones[i];if(x>=z.x&&x<=z.x+z.w&&y>=z.y&&y<=z.y+z.h){z.f();break}}});
function G(){return canvas.height*.72}function C(v,a,b){return Math.max(a,Math.min(b,v))}function ov(a,b){return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y}function mid(o){return o.x+o.w/2}
function goMode(){scr='mode';hud.style.display='none';scroll=0}function goSel(){scr='select';hud.style.display='none';scroll=0}function modeKey(k){if(k==='1'){mode='pvp';goSel()}if(k==='2'){mode='pvai';goSel()}if(k==='w'||k==='arrowup')diff=(diff+D.length-1)%D.length;if(k==='s'||k==='arrowdown')diff=(diff+1)%D.length;if(k==='enter')goSel()}function selKey(k){if(k==='a')pick1=(pick1+R.length-1)%R.length;if(k==='d')pick1=(pick1+1)%R.length;if(k==='arrowleft')pick2=(pick2+R.length-1)%R.length;if(k==='arrowright')pick2=(pick2+1)%R.length;if(k==='q')diff=(diff+D.length-1)%D.length;if(k==='e')diff=(diff+1)%D.length;if(k==='enter')start();if(k==='m'||k==='escape')goMode()}
function make(x,f,c,ctl,num,ai=0){return{num,ai,c,x,y:G()-82,w:38,h:82,vx:0,vy:0,f,hp:c.hp,max:c.hp,atk:0,cool:0,combo:0,reset:0,touch:0,stun:0,block:0,sp:0,spcd:0,buff:0,move:null,mt:0,mark:null,ctl}}
function start(){scr='fight';hud.style.display='flex';parts=[];gear=[];dash=[];A=make(180,1,R[pick1],{l:'a',r:'d',j:'w',m:'f',b:'g',s:'t'},1,0);B=make(canvas.width-220,-1,R[pick2],{l:'arrowleft',r:'arrowright',j:'arrowup',m:'/',b:'.',s:'enter'},2,mode==='pvai');n1.textContent='P1: '+A.c.name;n2.textContent=(B.ai?'AI '+D[diff].name+': ':'P2: ')+B.c.name}
function atkBox(o){let w=o.c.rg+(o.combo===4?18:0);return{x:o.f===1?o.x+o.w:o.x-w,y:o.y+18,w,h:52}}function spark(x,y,col,n=15,s=3){for(let i=0;i<n;i++){let a=Math.random()*6.28,v=Math.random()*s+1;parts.push({x,y,vx:Math.cos(a)*v,vy:Math.sin(a)*v,life:25,size:3+Math.random()*4,col})}}
function m1(o){if(o.cool||o.stun||o.move)return;if(o.reset<=0)o.combo=0;o.combo=o.combo%4+1;o.atk=o.combo===4?18:13;o.cool=o.c.cd+(o.combo===4?8:0);if(o.buff)o.cool=Math.max(7,o.cool-5);if(o.c.id==='vinny')o.cool=Math.max(8,o.cool-3);if(o.c.id==='gecko'&&o.combo===1)o.vx+=o.f*3;o.reset=46;o.touch=0}
function hurt(o,other,dmg,kb,up=-4){other.hp=Math.max(0,other.hp-dmg);other.vx=o.f*kb;other.vy=up;other.stun=Math.max(other.stun,16);spark(mid(other),other.y+35,o.c.a,18,4);freeze=5;if(other.hp<=0)scr='over'}
function contact(o,other){if(o.touch||!ov(atkBox(o),other))return;o.touch=1;let dmg=o.c.d[o.combo-1],kb=o.c.kb;if(o.c.id==='tag'&&o.combo===4)dmg+=5;if(other.block&&other.f===-o.f&&other.vy===0){dmg=Math.ceil(dmg*.35);kb*=.35;spark(mid(other),other.y+35,'#fff',8,2)}else other.stun=o.combo===4?24:13;hurt(o,other,dmg,kb,o.combo===4?-7:-3)}
function special(o,other){if(o.spcd||o.stun||o.move)return;o.spcd=255;o.sp=36;let x=mid(o),y=o.y+35;if(o.c.id==='gecko'){o.move='leap';o.mt=50;o.mark=other;o.vx=o.f*8;o.vy=-12;spark(x,y,o.c.a,24,4)}else if(o.c.id==='ripple'){o.move='slam';o.mt=32;o.vx=0;o.vy=-14;spark(x,y,o.c.a,20,4)}else if(o.c.id==='vinny'){o.buff=180;spark(x,y,o.c.a,36,4)}else if(o.c.id==='tag'){o.move='pincer';o.mt=58;o.mark=other;dash.push({t:58,o,other});other.stun=Math.max(other.stun,20);spark(mid(other),other.y+35,o.c.a,32,5)}else if(o.c.id==='sapphire'){for(let i=0;i<8;i++)gear.push({o,x:other.x-240+i*70+Math.random()*30,y:-80-Math.random()*250,vy:5+Math.random()*2,r:22+Math.random()*13,rot:Math.random()*6.28,life:240,hit:0,col:o.c.a});spark(mid(other),G()-90,o.c.a,36,5)}}
function stateMove(o,other){if(!o.move)return 0;o.mt--;if(o.move==='leap'){let tx=mid(other),ty=other.y+25,dx=tx-mid(o),dy=ty-(o.y+25),dist=Math.hypot(dx,dy)||1;if(dist<60){hurt(o,other,18,10,-7);o.vx=-o.f*4;o.vy=-6;o.move=null}else if(o.mt<36){o.vx+=dx/dist*1.9;o.vy+=dy/dist*1.1}if(o.mt<=0)o.move=null;return 1}if(o.move==='slam'){o.vy+=o.mt>12?1.2:3.4;if(o.y+o.h>=G()){o.y=G()-o.h;o.vy=0;if(Math.abs(mid(other)-mid(o))<170)hurt(o,other,17,8,-8);for(let i=0;i<42;i++){let a=i/42*6.28;parts.push({x:mid(o),y:G()-5,vx:Math.cos(a)*(2+Math.random()*5),vy:-Math.abs(Math.sin(a))*(1+Math.random()*4),life:28,size:3+Math.random()*5,col:o.c.a})}freeze=7;o.move=null}return 1}if(o.move==='pincer'){if(o.mt%8===0&&o.mt>8){other.hp=Math.max(0,other.hp-4);other.stun=Math.max(other.stun,8);other.vx=(o.mt%16===0?1:-1)*4;spark(mid(other),other.y+35,o.c.a,10,3);freeze=3}if(o.mt===8){other.hp=Math.max(0,other.hp-12);other.vx=o.f*14;other.vy=-8;other.stun=24;spark(mid(other),other.y+35,o.c.a,28,5);freeze=8}if(o.mt<=0)o.move=null;if(other.hp<=0)scr='over';return 1}return 0}
function inp(o){return{l:key[o.ctl.l],r:key[o.ctl.r],j:key[o.ctl.j],m:key[o.ctl.m],b:key[o.ctl.b],s:key[o.ctl.s]}}function bot(o,other){let d=D[diff];if(d.name==='Dummy')return{};mem.t=(mem.t||0)+1;if(mem.t%d.r&&d.name!=='Power Insane')return mem.last||{};let dis=mid(other)-mid(o),ab=Math.abs(dis),q={};if(ab>o.c.rg*.95){q.l=dis<0;q.r=dis>0}else if(ab<35){q.l=dis>0;q.r=dis<0}if(ab<o.c.rg+30&&Math.random()<d.a)q.m=1;if(other.atk&&ab<other.c.rg+45&&Math.random()<d.b)q.b=1;if(o.spcd<=0&&Math.random()<d.s)q.s=1;mem.last=q;return q}
function step(o,other,q){o.block=!!q.b;if(o.stun<=0&&!stateMove(o,other)){if(q.l){o.vx-=.75;o.f=-1}if(q.r){o.vx+=.75;o.f=1}if(q.j&&o.y+o.h>=G())o.vy=-o.c.j;if(q.m)m1(o);if(q.s)special(o,other)}else if(o.stun>0)o.move=null;o.vx=C(o.vx,-o.c.spd*(o.buff?1.18:1),o.c.spd*(o.buff?1.18:1));o.vy+=.78;o.x+=o.vx;o.y+=o.vy;o.vx*=o.y+o.h>=G()?.78:.93;if(o.y+o.h>=G()){o.y=G()-o.h;o.vy=0}o.x=C(o.x,20,canvas.width-o.w-20);if(o.atk>0){let e=(o.combo===4?18:13)-o.atk;if(e>=3&&e<=(o.combo===4?13:9))contact(o,other)}o.atk=Math.max(0,o.atk-1);o.cool=Math.max(0,o.cool-1);o.reset=Math.max(0,o.reset-1);o.stun=Math.max(0,o.stun-1);o.sp=Math.max(0,o.sp-1);o.spcd=Math.max(0,o.spcd-1);o.buff=Math.max(0,o.buff-1)}
function updateGear(a,b){for(let g of gear){g.y+=g.vy;g.vy+=.25;g.rot+=.16;g.life--;for(let o of[a,b])if(o!==g.o&&!g.hit&&Math.abs(mid(o)-g.x)<g.r+20&&Math.abs(o.y+35-g.y)<g.r+40){g.hit=1;hurt(g.o,o,13,8,-8);spark(g.x,g.y,g.col,22,4)}if(g.y>G()-10&&!g.hit){g.hit=1;spark(g.x,G()-10,g.col,16,3)}}gear=gear.filter(g=>g.life>0&&g.y<canvas.height+90)}
function stage(){ctx.clearRect(0,0,canvas.width,canvas.height);ctx.fillStyle='#ffffff0a';for(let i=0;i<9;i++)ctx.fillRect(i*190-((Date.now()/80)%190),70,80,canvas.height*.55);ctx.fillStyle='#202020';ctx.fillRect(0,G(),canvas.width,canvas.height-G());ctx.fillStyle='#ffffff15';ctx.fillRect(0,G(),canvas.width,4);drawGear();drawDash()}function gearShape(g){ctx.save();ctx.translate(g.x,g.y);ctx.rotate(g.rot);ctx.strokeStyle=g.col;ctx.fillStyle='#ffffff14';ctx.lineWidth=4;ctx.beginPath();for(let i=0;i<12;i++){let a=i*6.28/12,r=i%2?g.r:g.r*.72;ctx.lineTo(Math.cos(a)*r,Math.sin(a)*r)}ctx.closePath();ctx.fill();ctx.stroke();ctx.beginPath();ctx.arc(0,0,g.r*.35,0,6.28);ctx.stroke();ctx.restore()}function drawGear(){for(let g of gear)gearShape(g)}function drawDash(){for(let r of dash){r.t--;let x=mid(r.other),y=r.other.y+35;ctx.globalAlpha=Math.max(0,r.t/58);ctx.strokeStyle=r.o.c.c;ctx.lineWidth=7;ctx.beginPath();ctx.moveTo(x-120,y-20);ctx.lineTo(x+5,y);ctx.stroke();ctx.strokeStyle=r.o.c.p;ctx.beginPath();ctx.moveTo(x+120,y+20);ctx.lineTo(x-5,y);ctx.stroke();ctx.globalAlpha=1}dash=dash.filter(r=>r.t>0)}
function weapon(o){ctx.strokeStyle=o.c.a;ctx.lineWidth=o.c.k==='tag'||o.c.k==='staff'?6:4;ctx.lineCap='round';let r=(o.atk?32:22)+(o.combo||1)*3,d=o.f;ctx.beginPath();if(o.c.k==='dual'){ctx.moveTo(d*5,-8);ctx.lineTo(d*r,-10);ctx.moveTo(d*5,8);ctx.lineTo(d*r,10)}else if(o.c.k==='staff'){ctx.moveTo(d*5,-15);ctx.lineTo(d*r,15)}else if(o.c.k==='tag'){ctx.moveTo(d*5,-8);ctx.lineTo(d*r,6);ctx.moveTo(d*20,14);ctx.lineTo(d*(r+10),-10)}else{ctx.moveTo(d*5,-4);ctx.lineTo(d*r,5)}ctx.stroke()}function body(o,off=0,col){ctx.save();ctx.translate(mid(o)+off*o.f,o.y+o.h/2);if(o.stun)ctx.translate(Math.sin(Date.now()/22)*3,0);ctx.fillStyle='#0008';ctx.beginPath();ctx.ellipse(0,o.h/2+5,30,8,0,0,6.28);ctx.fill();ctx.fillStyle=o.stun?'#fff':(col||o.c.c);ctx.beginPath();ctx.roundRect(-17,-23,34,54,8);ctx.fill();ctx.beginPath();ctx.arc(0,-33,16,0,6.28);ctx.fill();ctx.fillStyle='#111';ctx.fillRect(o.f*5,-37,8*o.f,4);weapon(o);if(o.block){ctx.strokeStyle='#ffffffaa';ctx.lineWidth=3;ctx.beginPath();ctx.arc(o.f*27,1,18,-1.2,1.2);ctx.stroke()}ctx.restore()}function fighter(o,prev=0){if(o.c.id==='tag'){body(o,-16,o.c.c);body(o,18,o.c.p);ctx.fillStyle='#fffc';ctx.font='10px Arial';ctx.textAlign='center';ctx.fillText('TAG',mid(o),o.y-20)}else body(o,0);if(o.move==='leap'){ctx.strokeStyle=o.c.a;ctx.lineWidth=3;ctx.globalAlpha=.5;ctx.beginPath();ctx.arc(mid(o),o.y+30,46,0,6.28);ctx.stroke();ctx.globalAlpha=1}if(!prev&&o.reset>0){ctx.fillStyle='white';ctx.font='13px Arial';ctx.textAlign='center';ctx.fillText(o.c.m1+' M1-'+o.combo,mid(o),o.y-12)}if(!prev&&o.buff){ctx.fillStyle=o.c.a;ctx.font='12px Arial';ctx.textAlign='center';ctx.fillText('RANKED RUSH',mid(o),o.y-28)}}
function partsStep(){for(let p of parts){p.x+=p.vx;p.y+=p.vy;p.vy+=.08;p.life--}parts=parts.filter(p=>p.life>0);for(let p of parts){ctx.globalAlpha=p.life/25;ctx.fillStyle=p.col;ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,6.28);ctx.fill();ctx.globalAlpha=1}}
function card(x,y,w,h,c,on,lab,fn){zones.push({x,y,w,h,f:fn});ctx.fillStyle=on?'#ffffff38':'#0007';ctx.strokeStyle=on?c.c:'#ffffff40';ctx.lineWidth=on?4:2;ctx.beginPath();ctx.roundRect(x,y,w,h,16);ctx.fill();ctx.stroke();ctx.textAlign='center';ctx.fillStyle=on?c.c:'white';ctx.font='bold 19px Arial';ctx.fillText(c.name,x+w/2,y+28);ctx.fillStyle='#ffffffbb';ctx.font='12px Arial';ctx.fillText(c.role,x+w/2,y+50);fighter({x:x+w/2-19,y:y+88,w:38,h:82,f:1,c,stun:0,atk:1,combo:1,block:0,move:null},1);ctx.textAlign='left';ctx.fillStyle='#ffffffe0';ctx.font='12px Arial';ctx.fillText('Weapon: '+c.weapon,x+10,y+h-82);ctx.fillText('M1: '+c.m1,x+10,y+h-64);ctx.fillText('Special: '+c.sp,x+10,y+h-46);ctx.fillText('HP '+c.hp+'  SPD '+c.spd,x+10,y+h-28);ctx.fillText('M1 '+c.d.join('/'),x+10,y+h-11);ctx.textAlign='center';ctx.fillStyle='white';ctx.font='bold 12px Arial';ctx.fillText(lab,x+w/2,y+h-11)}
function drawMode(){zones=[];stage();tip.textContent='Prototype menu';ctx.textAlign='center';ctx.fillStyle='white';ctx.font='bold 44px Arial';ctx.fillText('FRIENDS BATTLEGROUNDS',canvas.width/2,105);ctx.font='17px Arial';ctx.fillStyle='#ffffffbb';ctx.fillText('Specials v5: P1 = T, P2 = Enter',canvas.width/2,135);let cx=canvas.width/2;btn(cx-330,190,300,90,'1  PvP','same keyboard',()=>{mode='pvp';goSel()},mode==='pvp');btn(cx+30,190,300,90,'2  PvAI','fight a bot',()=>{mode='pvai';goSel()},mode==='pvai');D.forEach((d,i)=>btn(cx-230,330+i*58,460,46,d.name,'AI difficulty',()=>{diff=i;mode='pvai'},diff===i))}
function drawSel(){zones=[];stage();tip.textContent='Character Select - scroll if needed';ctx.save();ctx.translate(0,-scroll);ctx.textAlign='center';ctx.fillStyle='white';ctx.font='bold 42px Arial';ctx.fillText('PICK YOUR FRIEND FIGHTER',canvas.width/2,95);let w=Math.min(182,canvas.width/6),h=250,g=10,total=w*R.length+g*(R.length-1),sx=canvas.width/2-total/2;ctx.textAlign='left';ctx.font='bold 22px Arial';ctx.fillText('Player 1',sx,160);R.forEach((c,i)=>card(sx+i*(w+g),180,w,h,c,pick1===i,'P1',()=>pick1=i));ctx.fillStyle='white';ctx.font='bold 22px Arial';ctx.fillText(mode==='pvai'?'AI Character':'Player 2',sx,470);R.forEach((c,i)=>card(sx+i*(w+g),490,w,h,c,pick2===i,mode==='pvai'?'AI':'P2',()=>pick2=i));if(mode==='pvai')btn(canvas.width-330,130,285,66,'AI: '+D[diff].name,'click to cycle',()=>diff=(diff+1)%D.length,true);btn(canvas.width/2-130,765,260,52,'START','Enter',start,true);btn(30,765,180,52,'BACK','M/Esc',goMode,false);ctx.fillStyle='#ffffffbb';ctx.font='15px Arial';ctx.textAlign='center';ctx.fillText('Fight: P1 WASD/F/G/T special. P2 arrows///./Enter special. R menu.',canvas.width/2,845);ctx.restore()}
function fight(){zones=[];stage();tip.textContent=scr==='over'?(A.hp<=0?(B.ai?'AI wins':'P2 wins'):'P1 wins')+' - R menu':(mode==='pvai'?'PvAI | P1 special T':'PvP | P1 special T, P2 special Enter');if(freeze>0)freeze--;else if(scr==='fight'){step(A,B,inp(A));step(B,A,B.ai?bot(B,A):inp(B));updateGear(A,B)}if(Math.abs(A.x-B.x)>10&&A.atk<=0&&!A.move)A.f=A.x<B.x?1:-1;if(Math.abs(A.x-B.x)>10&&B.atk<=0&&!B.move)B.f=B.x<A.x?1:-1;partsStep();fighter(A);fighter(B);if(A.hp<=0||B.hp<=0)scr='over';h1.style.width=A.hp/A.max*100+'%';h2.style.width=B.hp/B.max*100+'%';h1.style.background=A.c.c;h2.style.background=B.c.c}
function loop(){if(scr==='mode')drawMode();else if(scr==='select')drawSel();else fight();requestAnimationFrame(loop)}loop();
</script></body></html>
