<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Friends V6</title><style>html,body{margin:0;overflow:hidden;background:#0b1020;color:white;font-family:Arial}canvas{display:block}#tip{position:fixed;top:10px;left:0;right:0;text-align:center;font-weight:bold;text-shadow:0 2px 5px #000}#hud{position:fixed;top:40px;left:20px;right:20px;display:none;justify-content:space-between;pointer-events:none}.hudbox{width:40%;background:#0008;border:2px solid #fff4;padding:8px}.bar{height:18px;background:#333}.fill{height:100%;width:100%}</style></head><body><canvas id="c"></canvas><div id="tip"></div><div id="hud"><div class="hudbox"><b id="n1">P1</b><div class="bar"><div id="h1" class="fill"></div></div></div><div class="hudbox" style="text-align:right"><b id="n2">P2</b><div class="bar"><div id="h2" class="fill"></div></div></div></div><script>
const cvs=document.getElementById('c'),ctx=cvs.getContext('2d'),tip=document.getElementById('tip'),hud=document.getElementById('hud'),n1=document.getElementById('n1'),n2=document.getElementById('n2'),h1=document.getElementById('h1'),h2=document.getElementById('h2');function R(){cvs.width=innerWidth;cvs.height=innerHeight}addEventListener('resize',R);R();
const chars=[
{name:'Gecko85',role:'movement main',color:'#7cff4f',accent:'#d8ffd0',hp:105,spd:6.4,range:58,cd:14,dmg:[6,7,9,15],special:'Long Gecko Leap',kind:'dagger'},
{name:'Ripple',role:'balanced all-rounder',color:'#4cc9ff',accent:'#d7f4ff',hp:112,spd:5.4,range:66,cd:18,dmg:[7,8,10,16],special:'Ripple Groundslam',kind:'sword'},
{name:'VinnyIsGood',role:'sweat grinder',color:'#ffcc33',accent:'#fff3bd',hp:95,spd:6.8,range:60,cd:13,dmg:[6,7,10,18],special:'Ranked Rush',kind:'dual'},
{name:'Fishies + RedstoneMech',role:'two-person tag team',color:'#ff5f5f',alt:'#ff3030',accent:'#ffd0d0',hp:118,spd:5.8,range:70,cd:17,dmg:[7,8,11,20],special:'Pincer Elbow Rush',kind:'tag'},
{name:'SapphirePangolin',role:'creative redstone admin',color:'#8d7cff',accent:'#e3ddff',hp:125,spd:4.7,range:84,cd:22,dmg:[6,8,12,17],special:'Create Gearfall',kind:'staff'}];
const diffs=[{name:'Dummy',atk:0,spec:0},{name:'Normal AI',atk:.45,spec:.01},{name:'Power Insane',atk:.9,spec:.035}];let keys={},zones=[],screen='menu',mode='pvp',p1c=0,p2c=1,diff=1,A,B,parts=[],gears=[],rush=[],scroll=0,shake=0;addEventListener('keydown',e=>{let k=e.key.toLowerCase();keys[k]=1;if(['arrowleft','arrowright','arrowup','arrowdown','enter',' '].includes(k))e.preventDefault();if(screen==='fight'||screen==='over'){if(k==='r')menu()}else if(screen==='menu'){if(k==='1'){mode='pvp';select()}if(k==='2'){mode='pvai';select()}if(k==='w'||k==='arrowup')diff=(diff+2)%3;if(k==='s'||k==='arrowdown')diff=(diff+1)%3}else if(screen==='select'){if(k==='a')p1c=(p1c+4)%5;if(k==='d')p1c=(p1c+1)%5;if(k==='arrowleft')p2c=(p2c+4)%5;if(k==='arrowright')p2c=(p2c+1)%5;if(k==='q')diff=(diff+2)%3;if(k==='e')diff=(diff+1)%3;if(k==='enter')start();if(k==='escape'||k==='m')menu()}});addEventListener('keyup',e=>keys[e.key.toLowerCase()]=0);addEventListener('wheel',e=>{if(screen==='select'){scroll=Math.max(0,Math.min(260,scroll+e.deltaY));e.preventDefault()}},{passive:false});addEventListener('mousedown',e=>{let x=e.clientX,y=e.clientY+(screen==='select'?scroll:0);for(let i=zones.length-1;i>=0;i--){let z=zones[i];if(x>=z.x&&x<=z.x+z.w&&y>=z.y&&y<=z.y+z.h){z.f();break}}});
function ground(){return cvs.height*.72}function menu(){screen='menu';hud.style.display='none';scroll=0}function select(){screen='select';hud.style.display='none';scroll=0}function make(x,face,ch,ctrl,ai=false){return{x,y:ground()-82,w:38,h:82,vx:0,vy:0,face,ch,hp:ch.hp,max:ch.hp,combo:0,atk:0,cd:0,reset:0,stun:0,spec:0,buff:0,state:null,t:0,ai,ctrl}}function start(){screen='fight';hud.style.display='flex';parts=[];gears=[];rush=[];A=make(180,1,chars[p1c],{l:'a',r:'d',j:'w',m:'f',b:'g',s:'t'});B=make(cvs.width-220,-1,chars[p2c],{l:'arrowleft',r:'arrowright',j:'arrowup',m:'/',b:'.',s:'enter'},mode==='pvai');n1.textContent='P1: '+A.ch.name;n2.textContent=(B.ai?'AI '+diffs[diff].name+': ':'P2: ')+B.ch.name}
function bg(){ctx.fillStyle='#131c30';ctx.fillRect(0,0,cvs.width,cvs.height);ctx.fillStyle='#ffffff08';for(let i=0;i<9;i++)ctx.fillRect(i*190-((Date.now()/90)%190),70,80,cvs.height*.55);ctx.fillStyle='#202020';ctx.fillRect(0,ground(),cvs.width,cvs.height-ground());ctx.fillStyle='#ffffff18';ctx.fillRect(0,ground(),cvs.width,4)}function button(x,y,w,h,txt,sub,fn,on=false){zones.push({x,y,w,h,f:fn});ctx.fillStyle=on?'#ffffff35':'#0008';ctx.strokeStyle=on?'white':'#ffffff44';ctx.lineWidth=on?3:2;ctx.fillRect(x,y,w,h);ctx.strokeRect(x,y,w,h);ctx.textAlign='center';ctx.fillStyle='white';ctx.font='bold 22px Arial';ctx.fillText(txt,x+w/2,y+34);ctx.font='14px Arial';ctx.fillStyle='#ffffffbb';ctx.fillText(sub,x+w/2,y+58)}
function drawMenu(){zones=[];bg();tip.textContent='Prototype menu';ctx.textAlign='center';ctx.fillStyle='white';ctx.font='bold 46px Arial';ctx.fillText('FRIENDS BATTLEGROUNDS V6',cvs.width/2,105);ctx.font='18px Arial';ctx.fillStyle='#ffffffbb';ctx.fillText('P1 special = T   |   P2 special = Enter',cvs.width/2,138);let cx=cvs.width/2;button(cx-330,190,300,90,'1  PvP','same keyboard',()=>{mode='pvp';select()},mode==='pvp');button(cx+30,190,300,90,'2  PvAI','fight a bot',()=>{mode='pvai';select()},mode==='pvai');diffs.forEach((d,i)=>button(cx-230,325+i*58,460,46,d.name,'AI difficulty',()=>{diff=i;mode='pvai'},diff===i))}
function card(x,y,w,h,ch,on,label,fn){zones.push({x,y,w,h,f:fn});ctx.fillStyle=on?'#ffffff33':'#0008';ctx.strokeStyle=on?ch.color:'#ffffff44';ctx.lineWidth=on?4:2;ctx.fillRect(x,y,w,h);ctx.strokeRect(x,y,w,h);ctx.textAlign='center';ctx.fillStyle=on?ch.color:'white';ctx.font='bold 18px Arial';ctx.fillText(ch.name,x+w/2,y+28);ctx.fillStyle='#ffffffbb';ctx.font='12px Arial';ctx.fillText(ch.role,x+w/2,y+49);drawGuy({x:x+w/2-19,y:y+85,w:38,h:82,face:1,ch,stun:0,block:0,buff:0,state:null},true);ctx.textAlign='left';ctx.fillStyle='#ffffffe0';ctx.font='12px Arial';ctx.fillText('Special: '+ch.special,x+10,y+h-58);ctx.fillText('HP '+ch.hp+'  SPD '+ch.spd,x+10,y+h-38);ctx.fillText('M1 '+ch.dmg.join('/'),x+10,y+h-19);ctx.textAlign='center';ctx.fillStyle='white';ctx.font='bold 12px Arial';ctx.fillText(label,x+w/2,y+h-19)}function drawSelect(){zones=[];bg();tip.textContent='Character select - scroll if needed';ctx.save();ctx.translate(0,-scroll);ctx.textAlign='center';ctx.fillStyle='white';ctx.font='bold 40px Arial';ctx.fillText('PICK YOUR FRIEND FIGHTER',cvs.width/2,95);let w=Math.min(182,cvs.width/6),h=230,g=10,total=w*5+g*4,sx=cvs.width/2-total/2;ctx.textAlign='left';ctx.font='bold 22px Arial';ctx.fillText('Player 1',sx,155);chars.forEach((ch,i)=>card(sx+i*(w+g),175,w,h,ch,p1c===i,'P1',()=>p1c=i));ctx.fillStyle='white';ctx.font='bold 22px Arial';ctx.fillText(mode==='pvai'?'AI Character':'Player 2',sx,440);chars.forEach((ch,i)=>card(sx+i*(w+g),460,w,h,ch,p2c===i,mode==='pvai'?'AI':'P2',()=>p2c=i));if(mode==='pvai')button(cvs.width-320,125,280,66,'AI: '+diffs[diff].name,'click to cycle',()=>diff=(diff+1)%3,true);button(cvs.width/2-130,720,260,52,'START','Enter',start,true);button(30,720,180,52,'BACK','M/Esc',menu,false);ctx.fillStyle='#ffffffbb';ctx.font='15px Arial';ctx.textAlign='center';ctx.fillText('P1: WASD F/G/T.  P2: arrows / . Enter.  R menu.',cvs.width/2,810);ctx.restore()}
function spark(x,y,col,n=16,s=3){for(let i=0;i<n;i++){let a=Math.random()*Math.PI*2,v=Math.random()*s+1;parts.push({x,y,vx:Math.cos(a)*v,vy:Math.sin(a)*v,life:26,size:3+Math.random()*4,col})}}function box(o){let w=o.ch.range+(o.combo===4?18:0);return{x:o.face===1?o.x+o.w:o.x-w,y:o.y+18,w,h:52}}function ov(a,b){return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y}function mid(o){return o.x+o.w/2}function hurt(o,e,dmg,kb,up=-4){e.hp=Math.max(0,e.hp-dmg);e.vx=o.face*kb;e.vy=up;e.stun=Math.max(e.stun,16);spark(mid(e),e.y+35,o.ch.accent,18,4);shake=5;if(e.hp<=0)screen='over'}function m1(o){if(o.cd||o.stun||o.state)return;if(o.reset<=0)o.combo=0;o.combo=o.combo%4+1;o.atk=o.combo===4?18:13;o.cd=o.ch.cd+(o.combo===4?8:0);if(o.buff)o.cd=Math.max(7,o.cd-5);if(o.ch.name==='VinnyIsGood')o.cd=Math.max(8,o.cd-3);if(o.ch.name==='Gecko85'&&o.combo===1)o.vx+=o.face*3;o.reset=46;o.did=0}function hitCheck(o,e){if(o.did||!ov(box(o),e))return;o.did=1;let dmg=o.ch.dmg[o.combo-1],kb=o.ch.kb||7;if(o.ch.kind==='tag'&&o.combo===4)dmg+=5;if(e.block&&e.face===-o.face&&e.vy===0){dmg=Math.ceil(dmg*.35);kb*=.35;spark(mid(e),e.y+35,'#fff',8,2)}hurt(o,e,dmg,kb,o.combo===4?-7:-3)}
function special(o,e){if(o.spec||o.stun||o.state)return;o.spec=250;if(o.ch.name==='Gecko85'){o.state='leap';o.t=54;o.vx=o.face*8;o.vy=-12;spark(mid(o),o.y+35,o.ch.accent,28,4)}else if(o.ch.name==='Ripple'){o.state='slam';o.t=36;o.vx=0;o.vy=-14;spark(mid(o),o.y+35,o.ch.accent,20,4)}else if(o.ch.name==='VinnyIsGood'){o.buff=180;spark(mid(o),o.y+35,o.ch.accent,40,4)}else if(o.ch.kind==='tag'){o.state='pincer';o.t=58;dash.push({t:58,o,e});e.stun=Math.max(e.stun,20);spark(mid(e),e.y+35,o.ch.accent,34,5)}else{for(let i=0;i<8;i++)gears.push({owner:o,x:e.x-240+i*70+Math.random()*30,y:-90-Math.random()*250,vy:5+Math.random()*2,r:23+Math.random()*12,rot:Math.random()*6.28,life:240,hit:0,col:o.ch.accent});spark(mid(e),ground()-90,o.ch.accent,35,5)}}function runState(o,e){if(!o.state)return false;o.t--;if(o.state==='leap'){let dx=mid(e)-mid(o),dy=(e.y+25)-(o.y+25),dist=Math.hypot(dx,dy)||1;if(dist<60){hurt(o,e,18,10,-7);o.vx=-o.face*4;o.vy=-6;o.state=null}else if(o.t<40){o.vx+=dx/dist*1.9;o.vy+=dy/dist*1.1}if(o.t<=0)o.state=null;return true}if(o.state==='slam'){o.vy+=o.t>12?1.2:3.4;if(o.y+o.h>=ground()){o.y=ground()-o.h;o.vy=0;if(Math.abs(mid(e)-mid(o))<170)hurt(o,e,17,8,-8);for(let i=0;i<42;i++){let a=i/42*6.28;parts.push({x:mid(o),y:ground()-5,vx:Math.cos(a)*(2+Math.random()*5),vy:-Math.abs(Math.sin(a))*(1+Math.random()*4),life:28,size:3+Math.random()*5,col:o.ch.accent})}shake=7;o.state=null}return true}if(o.state==='pincer'){if(o.t%8===0&&o.t>8){e.hp=Math.max(0,e.hp-4);e.stun=Math.max(e.stun,8);e.vx=(o.t%16===0?1:-1)*4;spark(mid(e),e.y+35,o.ch.accent,10,3);shake=3}if(o.t===8){e.hp=Math.max(0,e.hp-12);e.vx=o.face*14;e.vy=-8;e.stun=24;spark(mid(e),e.y+35,o.ch.accent,28,5);shake=8}if(o.t<=0)o.state=null;return true}return false}
function input(o){return{l:keys[o.ctrl.l],r:keys[o.ctrl.r],j:keys[o.ctrl.j],m:keys[o.ctrl.m],b:keys[o.ctrl.b],s:keys[o.ctrl.s]}}function bot(o,e){let d=diffs[diff];if(d.name==='Dummy')return{};let dis=mid(e)-mid(o),ab=Math.abs(dis),q={};if(ab>o.ch.range){q.l=dis<0;q.r=dis>0}else if(ab<35){q.l=dis>0;q.r=dis<0}if(ab<o.ch.range+35&&Math.random()<d.atk)q.m=1;if(o.spec<=0&&Math.random()<d.spec)q.s=1;return q}function step(o,e,q){o.block=!!q.b;if(o.stun<=0&&!runState(o,e)){if(q.l){o.vx-=.75;o.face=-1}if(q.r){o.vx+=.75;o.face=1}if(q.j&&o.y+o.h>=ground())o.vy=-o.ch.j;if(q.m)m1(o);if(q.s)special(o,e)}else if(o.stun>0)o.state=null;o.vx=Math.max(-o.ch.spd*(o.buff?1.18:1),Math.min(o.ch.spd*(o.buff?1.18:1),o.vx));o.vy+=.78;o.x+=o.vx;o.y+=o.vy;o.vx*=o.y+o.h>=ground()?.78:.93;if(o.y+o.h>=ground()){o.y=ground()-o.h;o.vy=0}o.x=Math.max(20,Math.min(cvs.width-o.w-20,o.x));if(o.atk>0){let elapsed=(o.combo===4?18:13)-o.atk;if(elapsed>=3&&elapsed<=(o.combo===4?13:9))hitCheck(o,e)}o.atk=Math.max(0,o.atk-1);o.cd=Math.max(0,o.cd-1);o.reset=Math.max(0,o.reset-1);o.stun=Math.max(0,o.stun-1);o.spec=Math.max(0,o.spec-1);o.buff=Math.max(0,o.buff-1)}
function drawGear(g){ctx.save();ctx.translate(g.x,g.y);ctx.rotate(g.rot);ctx.strokeStyle=g.col;ctx.fillStyle='#ffffff18';ctx.lineWidth=4;ctx.beginPath();for(let i=0;i<12;i++){let a=i*Math.PI*2/12,r=i%2?g.r:g.r*.72;ctx.lineTo(Math.cos(a)*r,Math.sin(a)*r)}ctx.closePath();ctx.fill();ctx.stroke();ctx.beginPath();ctx.arc(0,0,g.r*.35,0,Math.PI*2);ctx.stroke();ctx.restore()}function updateGears(){for(let g of gears){g.y+=g.vy;g.vy+=.25;g.rot+=.16;g.life--;for(let o of[A,B])if(o!==g.owner&&!g.hit&&Math.abs(mid(o)-g.x)<g.r+20&&Math.abs(o.y+35-g.y)<g.r+40){g.hit=1;hurt(g.owner,o,13,8,-8);spark(g.x,g.y,g.col,22,4)}if(g.y>ground()-10&&!g.hit){g.hit=1;spark(g.x,ground()-10,g.col,16,3)}}gears=gears.filter(g=>g.life>0&&g.y<cvs.height+90)}function weapon(o){ctx.strokeStyle=o.ch.accent;ctx.lineWidth=o.ch.kind==='tag'||o.ch.kind==='staff'?6:4;ctx.lineCap='round';let r=(o.atk?32:22)+(o.combo||1)*3,d=o.face;ctx.beginPath();if(o.ch.kind==='dual'){ctx.moveTo(d*5,-8);ctx.lineTo(d*r,-10);ctx.moveTo(d*5,8);ctx.lineTo(d*r,10)}else if(o.ch.kind==='staff'){ctx.moveTo(d*5,-15);ctx.lineTo(d*r,15)}else if(o.ch.kind==='tag'){ctx.moveTo(d*5,-8);ctx.lineTo(d*r,6);ctx.moveTo(d*20,14);ctx.lineTo(d*(r+10),-10)}else{ctx.moveTo(d*5,-4);ctx.lineTo(d*r,5)}ctx.stroke()}function body(o,off=0,col=null){ctx.save();ctx.translate(mid(o)+off*o.face,o.y+o.h/2);if(o.stun)ctx.translate(Math.sin(Date.now()/22)*3,0);ctx.fillStyle='#0008';ctx.beginPath();ctx.ellipse(0,o.h/2+5,30,8,0,0,Math.PI*2);ctx.fill();ctx.fillStyle=o.stun?'#fff':(col||o.ch.color);ctx.fillRect(-17,-23,34,54);ctx.beginPath();ctx.arc(0,-33,16,0,Math.PI*2);ctx.fill();ctx.fillStyle='#111';ctx.fillRect(o.face*5,-37,8*o.face,4);weapon(o);if(o.block){ctx.strokeStyle='#fff9';ctx.lineWidth=3;ctx.beginPath();ctx.arc(o.face*27,1,18,-1.2,1.2);ctx.stroke()}ctx.restore()}function drawGuy(o,prev=false){if(o.ch.kind==='tag'){body(o,-16,o.ch.color);body(o,18,o.ch.alt);ctx.fillStyle='#fffc';ctx.font='10px Arial';ctx.textAlign='center';ctx.fillText('TAG',mid(o),o.y-20)}else body(o);if(o.state==='leap'){ctx.strokeStyle=o.ch.accent;ctx.globalAlpha=.5;ctx.beginPath();ctx.arc(mid(o),o.y+30,46,0,Math.PI*2);ctx.stroke();ctx.globalAlpha=1}if(!prev&&o.reset>0){ctx.fillStyle='white';ctx.font='13px Arial';ctx.textAlign='center';ctx.fillText('M1-'+o.combo,mid(o),o.y-12)}if(!prev&&o.buff){ctx.fillStyle=o.ch.accent;ctx.font='12px Arial';ctx.textAlign='center';ctx.fillText('RANKED RUSH',mid(o),o.y-28)}}
function fight(){zones=[];bg();for(let g of gears)drawGear(g);for(let r of dash){r.t--;let x=mid(r.e),y=r.e.y+35;ctx.globalAlpha=Math.max(0,r.t/58);ctx.strokeStyle=r.o.ch.color;ctx.lineWidth=7;ctx.beginPath();ctx.moveTo(x-120,y-20);ctx.lineTo(x+5,y);ctx.stroke();ctx.strokeStyle=r.o.ch.alt||r.o.ch.accent;ctx.beginPath();ctx.moveTo(x+120,y+20);ctx.lineTo(x-5,y);ctx.stroke();ctx.globalAlpha=1}dash=dash.filter(r=>r.t>0);tip.textContent=screen==='over'?(A.hp<=0?(B.ai?'AI wins':'P2 wins'):'P1 wins')+' - R menu':(mode==='pvai'?'PvAI | T special':'PvP | T / Enter specials');if(shake>0)shake--;else if(screen==='fight'){step(A,B,input(A));step(B,A,B.ai?bot(B,A):input(B));updateGears()}if(Math.abs(A.x-B.x)>10&&!A.state)A.face=A.x<B.x?1:-1;if(Math.abs(A.x-B.x)>10&&!B.state)B.face=B.x<A.x?1:-1;for(let p of parts){p.x+=p.vx;p.y+=p.vy;p.vy+=.08;p.life--}parts=parts.filter(p=>p.life>0);for(let p of parts){ctx.globalAlpha=p.life/26;ctx.fillStyle=p.col;ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1}drawGuy(A);drawGuy(B);if(A.hp<=0||B.hp<=0)screen='over';h1.style.width=A.hp/A.max*100+'%';h2.style.width=B.hp/B.max*100+'%';h1.style.background=A.ch.color;h2.style.background=B.ch.color}function loop(){if(screen==='menu')drawMenu();else if(screen==='select')drawSelect();else fight();requestAnimationFrame(loop)}loop();
</script></body></html>
